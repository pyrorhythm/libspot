syntax = "proto3";

package spotify.cappingapi.storage;

import "google/protobuf/timestamp.proto";

message Quota {
  .google.protobuf.Timestamp valid_from = 1;
  .google.protobuf.Timestamp expires_on = 2;
  int32 priority = 3;
  int64 allowance = 4;
  int64 consumption = 5;
}

message QuotaInfo {
  .spotify.cappingapi.storage.Feature feature = 1;
  bool is_capping_enabled = 2;
  .google.protobuf.Timestamp refreshes_at = 3;
  repeated .spotify.cappingapi.storage.Quota quotas = 4;
}

message ConsumptionEvent {
  .spotify.cappingapi.storage.Feature feature = 1;
  int64 consumption_value = 2;
  string consumption_details = 3;
  string deduplication_id = 4;
  .google.protobuf.Timestamp timestamp = 5;
  bool is_sending = 6;
}

enum Feature {
  UNDEFINED = 0;
  AUDIOBOOK_SUBSCRIPTION = 1;
  PICK_AND_SHUFFLE = 2;
  LYRICS = 3;
}

