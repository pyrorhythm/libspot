syntax = "proto2";

package spotify.player.proto;

import "context_player_options.proto";
import "pause_resume_origin.proto";
import "player_license.proto";

message GlobalNode {
  message ConfigurationEntry {
    optional string key = 1;
    optional string value = 2;
  }

  optional .spotify.player.proto.ContextPlayerOptions options = 1;
  optional .spotify.player.proto.PlayerLicense license = 2;
  repeated .spotify.player.proto.GlobalNode.ConfigurationEntry configuration = 3;
  optional .spotify.player.proto.PauseResumeOrigin pause_resume_origin = 4;
  optional bool is_paused = 5;
}

