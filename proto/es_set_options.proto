syntax = "proto3";

package spotify.player.esperanto.proto;

option java_package = "com.spotify.player.esperanto.proto";
option objc_class_prefix = "ESP";

import "es_command_options.proto";
import "es_logging_params.proto";
import "es_optional.proto";

message SetOptionsRequest {
  message ModesEntry {
    string key = 1;
    string value = 2;
  }

  .spotify.player.esperanto.proto.OptionalBoolean repeating_track = 1;
  .spotify.player.esperanto.proto.OptionalBoolean repeating_context = 2;
  .spotify.player.esperanto.proto.OptionalBoolean shuffling_context = 3;
  .spotify.player.esperanto.proto.CommandOptions options = 4;
  .spotify.player.esperanto.proto.LoggingParams logging_params = 5;
  repeated .spotify.player.esperanto.proto.SetOptionsRequest.ModesEntry modes = 7;
  optional float playback_speed = 6;
}

