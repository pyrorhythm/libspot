syntax = "proto3";

package spotify.connectstate;

option java_package = "com.spotify.connectstate.model";

message PlayerState {
  reserved 26;
  reserved 27;
  reserved 28;
  reserved 29;
  reserved 30;
  reserved 31;
  reserved 34;
  reserved 36;
  message ContextMetadataEntry {
    string key = 1;
    string value = 2;
  }

  message PageMetadataEntry {
    string key = 1;
    string value = 2;
  }

  int64 timestamp = 1;
  string context_uri = 2;
  string context_url = 3;
  .spotify.connectstate.Restrictions context_restrictions = 4;
  .spotify.connectstate.PlayOrigin play_origin = 5;
  .spotify.connectstate.ContextIndex index = 6;
  .spotify.connectstate.ProvidedTrack track = 7;
  string playback_id = 8;
  double playback_speed = 9;
  int64 position_as_of_timestamp = 10;
  int64 duration = 11;
  bool is_playing = 12;
  bool is_paused = 13;
  bool is_buffering = 14;
  bool is_system_initiated = 15;
  .spotify.connectstate.ContextPlayerOptions options = 16;
  .spotify.connectstate.Restrictions restrictions = 17;
  .spotify.connectstate.Suppressions suppressions = 18;
  repeated .spotify.connectstate.ProvidedTrack prev_tracks = 19;
  repeated .spotify.connectstate.ProvidedTrack next_tracks = 20;
  repeated .spotify.connectstate.PlayerState.ContextMetadataEntry context_metadata = 21;
  repeated .spotify.connectstate.PlayerState.PageMetadataEntry page_metadata = 22;
  string session_id = 23;
  string queue_revision = 24;
  int64 position = 25;
  .spotify.connectstate.PlaybackQuality playback_quality = 32;
  repeated string signals = 33;
  string session_command_id = 35;
  optional .spotify.connectstate.AdBreakContext ad_break_context = 37;
  optional .spotify.connectstate.SleepTimer sleep_timer = 38;
}

message ProvidedTrack {
  reserved 11;
  message MetadataEntry {
    string key = 1;
    string value = 2;
  }

  string uri = 1;
  string uid = 2;
  repeated .spotify.connectstate.ProvidedTrack.MetadataEntry metadata = 3;
  repeated string removed = 4;
  repeated string blocked = 5;
  string provider = 6;
  .spotify.connectstate.Restrictions restrictions = 7;
  string album_uri = 8;
  repeated string disallow_reasons = 9;
  string artist_uri = 10;
}

message ContextIndex {
  uint32 page = 1;
  uint32 track = 2;
}

message ModeRestrictions {
  message ValuesEntry {
    string key = 1;
    .spotify.connectstate.RestrictionReasons value = 2;
  }

  repeated .spotify.connectstate.ModeRestrictions.ValuesEntry values = 1;
}

message RestrictionReasons {
  repeated string reasons = 1;
}

message Restrictions {
  reserved 26;
  reserved 27;
  message DisallowSettingModesEntry {
    string key = 1;
    .spotify.connectstate.ModeRestrictions value = 2;
  }

  message DisallowSignalsEntry {
    string key = 1;
    .spotify.connectstate.RestrictionReasons value = 2;
  }

  repeated string disallow_pausing_reasons = 1;
  repeated string disallow_resuming_reasons = 2;
  repeated string disallow_seeking_reasons = 3;
  repeated string disallow_peeking_prev_reasons = 4;
  repeated string disallow_peeking_next_reasons = 5;
  repeated string disallow_skipping_prev_reasons = 6;
  repeated string disallow_skipping_next_reasons = 7;
  repeated string disallow_toggling_repeat_context_reasons = 8;
  repeated string disallow_toggling_repeat_track_reasons = 9;
  repeated string disallow_toggling_shuffle_reasons = 10;
  repeated string disallow_set_queue_reasons = 11;
  repeated string disallow_interrupting_playback_reasons = 12;
  repeated string disallow_transferring_playback_reasons = 13;
  repeated string disallow_remote_control_reasons = 14;
  repeated string disallow_inserting_into_next_tracks_reasons = 15;
  repeated string disallow_inserting_into_context_tracks_reasons = 16;
  repeated string disallow_reordering_in_next_tracks_reasons = 17;
  repeated string disallow_reordering_in_context_tracks_reasons = 18;
  repeated string disallow_removing_from_next_tracks_reasons = 19;
  repeated string disallow_removing_from_context_tracks_reasons = 20;
  repeated string disallow_updating_context_reasons = 21;
  repeated string disallow_playing_reasons = 22;
  repeated string disallow_stopping_reasons = 23;
  repeated string disallow_add_to_queue_reasons = 24;
  repeated string disallow_setting_playback_speed_reasons = 25;
  repeated .spotify.connectstate.Restrictions.DisallowSettingModesEntry disallow_setting_modes = 28;
  repeated .spotify.connectstate.Restrictions.DisallowSignalsEntry disallow_signals = 29;
  repeated string disallow_play_as_next_in_queue_reasons = 30;
  repeated string disallow_sleep_timer_clear_reasons = 31;
  repeated string disallow_sleep_timer_duration_reasons = 32;
  repeated string disallow_sleep_timer_end_of_track_reasons = 33;
  repeated string disallow_add_to_queue_track_reasons = 34;
  repeated string disallow_tap_to_play_track_in_next_tracks_reasons = 35;
  repeated string disallow_reordering_track_in_next_tracks_reasons = 36;
  repeated string disallow_reordering_episode_in_next_tracks_reasons = 37;
  repeated string disallow_reordering_enqueued_track_in_next_tracks_reasons = 38;
  repeated string disallow_reordering_enqueued_episode_in_next_tracks_reasons = 39;
  repeated string disallow_viewing_queue_reasons = 40;
  repeated string disallow_viewing_ordered_tracks_in_next_tracks_reasons = 41;
}

message PlayOrigin {
  string feature_identifier = 1;
  string feature_version = 2;
  string view_uri = 3;
  string external_referrer = 4;
  string referrer_identifier = 5;
  string device_identifier = 6;
  repeated string feature_classes = 7;
  string restriction_identifier = 8;
}

message ContextPlayerOptions {
  message ModesEntry {
    string key = 1;
    string value = 2;
  }

  bool shuffling_context = 1;
  bool repeating_context = 2;
  bool repeating_track = 3;
  repeated .spotify.connectstate.ContextPlayerOptions.ModesEntry modes = 5;
  optional float playback_speed = 4;
}

message Suppressions {
  repeated string providers = 1;
}

message PlaybackQuality {
  .spotify.connectstate.BitrateLevel bitrate_level = 1;
  .spotify.connectstate.BitrateStrategy strategy = 2;
  .spotify.connectstate.BitrateLevel target_bitrate_level = 3;
  bool target_bitrate_available = 4;
  .spotify.connectstate.HiFiStatus hifi_status = 5;
}

message AdBreakContext {
  uint64 max_seconds_remaining = 1;
  uint64 position_in_current_ad_break = 2;
  uint64 total_ads_in_break_estimate = 3;
}

message SleepTimer {
  message None {
  }

  message Timestamp {
    int64 timestamp = 1;
  }

  message EndOfTrack {
  }

  oneof timer_type {
    .spotify.connectstate.SleepTimer.None none = 1;
    .spotify.connectstate.SleepTimer.Timestamp timestamp = 2;
    .spotify.connectstate.SleepTimer.EndOfTrack end_of_track = 3;
  }
}

enum BitrateLevel {
  unknown_bitrate_level = 0;
  low = 1;
  normal = 2;
  high = 3;
  very_high = 4;
  hifi = 5;
  hifi24 = 6;
}

enum BitrateStrategy {
  unknown_strategy = 0;
  best_matching = 1;
  backend_advised = 2;
  offlined_file = 3;
  cached_file = 4;
  local_file = 5;
}

enum HiFiStatus {
  none = 0;
  off = 1;
  on = 2;
}

