syntax = "proto3";

package spotify.player.esperanto.proto;

option java_package = "com.spotify.player.esperanto.proto";
option objc_class_prefix = "ESP";

import "es_logging_params.proto";
import "es_command_options.proto";
import "google/protobuf/duration.proto";

message SetSleepTimerRequest {
  message Duration {
    .google.protobuf.Duration duration = 1;
  }

  message EndOfTrack {
  }

  message Clear {
  }

  .spotify.player.esperanto.proto.CommandOptions options = 1;
  .spotify.player.esperanto.proto.LoggingParams logging_params = 2;
  oneof timer_type {
    .spotify.player.esperanto.proto.SetSleepTimerRequest.Clear clear = 3;
    .spotify.player.esperanto.proto.SetSleepTimerRequest.Duration duration = 4;
    .spotify.player.esperanto.proto.SetSleepTimerRequest.EndOfTrack end_of_track = 5;
  }
}

