syntax = "proto3";

package spotify.player.esperanto.proto;

option java_package = "com.spotify.player.esperanto.proto";
option objc_class_prefix = "ESP";

import "es_context_track.proto";

message ContextPage {
  message MetadataEntry {
    string key = 1;
    string value = 2;
  }

  repeated .spotify.player.esperanto.proto.ContextTrack tracks = 1;
  repeated .spotify.player.esperanto.proto.ContextPage.MetadataEntry metadata = 2;
  string page_url = 3;
  string next_page_url = 4;
  bool is_loading = 5;
}

