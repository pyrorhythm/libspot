syntax = "proto2";

package spotify.event_sender.proto;

message OfflineReport {
  message ContextNumLinksMapEntry {
    optional string key = 1;
    optional int64 value = 2;
  }

  message LinktypeNumTracksMapEntry {
    optional string key = 1;
    optional int64 value = 2;
  }

  message ScheduleStatsMapEntry {
    optional string key = 1;
    optional int64 value = 2;
  }

  message UpdateStatsMapEntry {
    optional string key = 1;
    optional int64 value = 2;
  }

  optional int64 total_num_tracks = 1;
  optional int64 num_downloaded_tracks = 2;
  optional int64 num_downloaded_tracks_keyless = 3;
  optional int64 total_num_links = 4;
  optional int64 total_num_links_keyless = 5;
  repeated .spotify.event_sender.proto.OfflineReport.ContextNumLinksMapEntry context_num_links_map = 6;
  repeated .spotify.event_sender.proto.OfflineReport.LinktypeNumTracksMapEntry linktype_num_tracks_map = 7;
  optional int64 track_limit = 8;
  optional int64 expiry = 9;
  optional string change_reason = 10;
  optional int64 offline_keys = 11;
  optional int64 cached_keys = 12;
  optional int64 total_num_episodes = 13;
  optional int64 num_downloaded_episodes = 14;
  optional int64 episode_limit = 15;
  optional int64 episode_expiry = 16;
  optional int64 abp_chapter_expiry = 17;
  repeated .spotify.event_sender.proto.OfflineReport.ScheduleStatsMapEntry schedule_stats_map = 18;
  repeated .spotify.event_sender.proto.OfflineReport.UpdateStatsMapEntry update_stats_map = 19;
  optional int64 num_update_all_lists = 20;
  optional int64 key_cache_limit = 21;
  optional int64 key_cache_max_offline_seconds = 22;
}

