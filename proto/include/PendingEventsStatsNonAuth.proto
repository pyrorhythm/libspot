syntax = "proto2";

package spotify.event_sender.proto;

message PendingEventsStatsNonAuth {
  repeated string event_names = 1;
  repeated int64 sequence_number_mins = 2;
  repeated int64 sequence_number_nexts = 3;
  repeated int64 storage_sizes = 4;
  repeated int64 num_dropped_events = 5;
  repeated int64 counter_entered = 6;
  repeated int64 counter_add_failed_bad_input = 7;
  repeated int64 counter_add_failed_storage_error = 8;
  repeated int64 counter_persisted = 9;
  repeated int64 counter_replace_failed_bad_input = 10;
  repeated int64 counter_replace_failed_storage_error = 11;
  repeated int64 counter_commit_failed_bad_input = 12;
  repeated int64 counter_commit_failed_storage_error = 13;
  repeated int64 counter_commit_failed_event_sender_error = 14;
  repeated int64 counter_passed_to_event_sender = 15;
}

