syntax = "proto2";

package spotify.event_sender.proto;

message VideoManifestDownload {
  optional bytes playback_id = 1;
  optional string session_id = 2;
  optional string video_id = 3;
  optional int64 content_size = 4;
  optional bool from_cache = 5;
  optional bool had_cache_error = 6;
  optional int64 error_code = 7;
  optional string error_detail = 8;
  optional int32 retries = 9;
  optional string request_type = 10;
  optional int64 cdn_initial_latency = 11;
  optional int64 total_time = 12;
}

