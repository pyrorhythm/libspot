syntax = "proto2";

package spotify.event_sender.proto;

message SlowLoadingListEvent {
  optional string list_uri = 1;
  optional int32 feature_id = 2;
  optional int32 synchronization_state = 3;
  optional bool cache_exists = 4;
  optional string cache_read_status = 5;
  optional bool cache_has_revision = 6;
  optional bool cache_has_pending_changes = 7;
  optional bool cache_has_requested_lenses = 8;
  optional int32 num_items_in_cache = 9;
  optional int32 esperanto_waited_for_s = 10;
  optional bool esperanto_waiting_to_load_list = 11;
  optional bool esperanto_waiting_for_list_metadata = 12;
  optional bool esperanto_waiting_for_list_rows = 13;
  optional bool esperanto_waiting_for_recommendations = 14;
  optional bool esperanto_waiting_for_item_metadata = 15;
  optional bool esperanto_waiting_for_item_metadata_extensions = 16;
  optional bool list_is_in_transaction = 17;
  optional int32 offline_state = 18;
}

