syntax = "proto2";

package spotify.event_sender.proto;

message ConnectStateRestoreResult {
  optional string result = 1;
  optional string reason = 2;
  optional string new_track_uri_category = 3;
  optional int64 time_since_startup = 4;
  optional int64 time_since_last_connection_lost = 5;
  optional int64 restores_since_startup = 6;
  optional int64 time_since_foreground_online = 7;
  optional string command_id = 8;
  optional bytes playback_id = 9;
  optional bool is_initial_restore_sequence = 10;
  optional string before_track_uri_category = 11;
  optional int64 synchronous_restore_duration_ms = 12;
  optional int64 time_to_playback_id_ms = 13;
  optional bool did_change_track = 14;
}

