syntax = "proto2";

package spotify.event_sender.proto;

message TimeMeasurementErrorNonAuth {
  message ErrorDataEntry {
    optional string key = 1;
    optional string value = 2;
  }

  message OngoingPointTimestampsEntry {
    optional string key = 1;
    optional int64 value = 2;
  }

  message OngoingPointFeatureIdsEntry {
    optional string key = 1;
    optional string value = 2;
  }

  message DimensionsEntry {
    optional string key = 1;
    optional string value = 2;
  }

  message PointTimestampsEntry {
    optional string key = 1;
    optional int64 value = 2;
  }

  message PointDurationsEntry {
    optional string key = 1;
    optional int64 value = 2;
  }

  message PointFeatureIdsEntry {
    optional string key = 1;
    optional string value = 2;
  }

  message MetadataEntry {
    optional string key = 1;
    optional string value = 2;
  }

  optional int32 error_code = 1;
  repeated .spotify.event_sender.proto.TimeMeasurementErrorNonAuth.ErrorDataEntry error_data = 2;
  repeated .spotify.event_sender.proto.TimeMeasurementErrorNonAuth.OngoingPointTimestampsEntry ongoing_point_timestamps = 3;
  repeated .spotify.event_sender.proto.TimeMeasurementErrorNonAuth.OngoingPointFeatureIdsEntry ongoing_point_feature_ids = 4;
  optional string category = 5;
  repeated .spotify.event_sender.proto.TimeMeasurementErrorNonAuth.DimensionsEntry dimensions = 6;
  repeated .spotify.event_sender.proto.TimeMeasurementErrorNonAuth.PointTimestampsEntry point_timestamps = 7;
  repeated .spotify.event_sender.proto.TimeMeasurementErrorNonAuth.PointDurationsEntry point_durations = 8;
  repeated .spotify.event_sender.proto.TimeMeasurementErrorNonAuth.PointFeatureIdsEntry point_feature_ids = 9;
  optional string feature_id = 10;
  optional string measurement_id = 11;
  optional string parent_measurement_id = 12;
  optional int64 parent_epoch_offset = 13;
  repeated .spotify.event_sender.proto.TimeMeasurementErrorNonAuth.MetadataEntry metadata = 14;
}

