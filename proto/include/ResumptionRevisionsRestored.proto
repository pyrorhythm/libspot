syntax = "proto2";

package spotify.event_sender.proto;

message ResumptionRevisionsRestored {
  optional int32 number_of_key_read_success = 1;
  optional int32 number_of_key_failures = 2;
  optional int32 number_of_revision_read_success = 3;
  optional int32 number_of_revision_parse_failures = 4;
  optional float seconds_reading = 5;
  optional int64 bytes_read = 6;
}

