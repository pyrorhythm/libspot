syntax = "proto2";

package spotify.event_sender.proto;

message TimeMeasurement {
  message DimensionsEntry {
    optional string key = 1;
    optional string value = 2;
  }

  message PointTimestampsEntry {
    optional string key = 1;
    optional int64 value = 2;
  }

  message PointDurationsEntry {
    optional string key = 1;
    optional int64 value = 2;
  }

  message PointFeatureIdsEntry {
    optional string key = 1;
    optional string value = 2;
  }

  message MetadataEntry {
    optional string key = 1;
    optional string value = 2;
  }

  optional string category = 1;
  repeated .spotify.event_sender.proto.TimeMeasurement.DimensionsEntry dimensions = 2;
  repeated .spotify.event_sender.proto.TimeMeasurement.PointTimestampsEntry point_timestamps = 3;
  repeated .spotify.event_sender.proto.TimeMeasurement.PointDurationsEntry point_durations = 4;
  repeated .spotify.event_sender.proto.TimeMeasurement.PointFeatureIdsEntry point_feature_ids = 5;
  optional string feature_id = 6;
  optional string measurement_id = 7;
  optional string parent_measurement_id = 8;
  optional int64 parent_epoch_offset = 9;
  repeated .spotify.event_sender.proto.TimeMeasurement.MetadataEntry metadata = 10;
}

