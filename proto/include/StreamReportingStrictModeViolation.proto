syntax = "proto2";

package spotify.event_sender.proto;

message StreamReportingStrictModeViolation {
  optional bytes stream_id = 1;
  repeated bytes clip_playback_ids = 2;
  optional string orchestration_stack = 3;
  repeated string playback_stacks = 4;
  optional int64 core_version = 5;
  optional int32 ms_played = 6;
  optional int32 ms_played_deviation = 7;
  optional int32 start_position_deviation = 8;
}

