syntax = "proto2";

package spotify.event_sender.proto;

message ProgressiveDownload {
  optional bytes playback_id = 1;
  optional int64 bytes_from_cdn = 2;
  optional int64 bytes_from_cache = 3;
  optional int64 content_size = 4;
  optional string content_type = 5;
  optional int64 cdn_initial_latency = 6;
  optional double cdn_avg_bw = 7;
  optional string cdn_uri_scheme = 8;
  optional string cdn_domain = 9;
  optional int64 bytes_from_carrier = 10;
  optional int64 bytes_from_unknown = 11;
  optional int64 bytes_from_wifi = 12;
  optional string request_type = 13;
  optional int64 total_time = 14;
  optional string initial_disk_state = 15;
  optional bytes file_id = 16;
  optional string session_id = 17;
  optional int64 reqs_from_cdn = 18;
  optional int64 error_from_cdn = 19;
  optional bool had_cache_error = 20;
}

