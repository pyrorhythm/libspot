syntax = "proto2";

package spotify.event_sender.proto;

message SAIMetadataReceived {
  optional string metadata_request_id = 1;
  optional string track_uri = 2;
  optional string source = 3;
  optional int32 http_status_code = 4;
  optional bool is_online = 5;
  optional bool is_stale = 6;
  optional int64 fetch_duration_ms = 7;
}

