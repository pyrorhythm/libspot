syntax = "proto2";

package spotify.event_sender.proto;

message ConnectInstallationResult {
  optional string result = 1;
  optional string device_type = 2;
  optional string device_model = 3;
  optional string device_brand = 4;
  optional int64 duration = 5;
  optional string installation_debug_log = 6;
  optional string target_device_id = 7;
  optional string final_installation_state = 8;
  optional string error_code = 9;
  repeated string interaction_ids = 10;
}

