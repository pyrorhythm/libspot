syntax = "proto2";

package spotify.event_sender.proto;

message DesktopAuthenticationFailureNonAuth {
  optional string action_hash = 1;
  optional string error_category = 2;
  optional int32 error_code = 3;
  optional string oauth_user_agent = 4;
  optional string auth_method = 5;
  optional bool use_auth_client = 6;
  optional int32 attempt = 7;
  optional bool use_dpop = 8;
  optional string tracing_request_id = 9;
  optional string tracing_initial_request_id = 10;
}

