syntax = "proto3";

package spotify.mdata.proto;

option java_package = "com.spotify.mdata.proto";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";

message AudiobookSpecifics {
  string uri = 1;
  .spotify.mdata.proto.Credits credits = 2;
  string edition = 3;
  int64 duration_ms = 4;
  .google.protobuf.Timestamp publish_date = 5;
  string main_title = 6;
  string subtitle = 7;
  string series_number = 8;
  string series_name = 9;
}

message Credits {
  reserved 1;
  message Publisher {
    reserved 1;
    string name = 2;
  }

  message Author {
    reserved 1;
    string name = 2;
  }

  message Narrator {
    reserved 1;
    string name = 2;
  }

  repeated .spotify.mdata.proto.Credits.Publisher publishers = 2;
  repeated .spotify.mdata.proto.Credits.Author authors = 3;
  repeated .spotify.mdata.proto.Credits.Narrator narrators = 4;
}

