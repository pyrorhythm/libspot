syntax = "proto3";

package spotify.playlist.proto;

import "playlist_item_reporting_context.proto";
import "auxiliary_media.proto";

message ShuffleListMetadata {
  bool shuffle_enabled = 1;
}

message ListHeader {
  string uri = 1;
  .spotify.playlist.proto.ShuffleListMetadata shuffle = 2;
  string list_license = 3;
  string list_revision = 4;
  bool is_audiobook = 5;
  .spotify.playlist.proto.AuxiliaryMedia auxiliary_media = 6;
  bool is_interruptible = 7;
  .spotify.playlist.proto.EndOfListAction end_of_list_action = 8;
  bool fully_cached_files_only = 9;
  bool is_on_demand_playback_allowed = 10;
}

message ShuffleItemMetadata {
  enum ShuffleRemove {
    UNKNOWN = 0;
    NEVER = 1;
    ALWAYS = 2;
  }

  string distribution = 1;
  string group_shuffle = 2;
  string partition_shuffle = 3;
  .spotify.playlist.proto.ShuffleItemMetadata.ShuffleRemove remove = 4;
  string group_forward = 5;
  string partition_forward = 6;
}

message FormatAttributes {
  bool is_trailer = 1;
}

message MediaSlice {
  int64 start_ms = 1;
  optional int64 end_ms = 2;
  optional int64 transition_start_ms = 3;
}

message ListItem {
  enum MediaPreference {
    MEDIA_PREFERENCE_UNKNOWN = 0;
    MEDIA_PREFERENCE_AUDIO = 1;
    MEDIA_PREFERENCE_VIDEO = 2;
  }

  enum Provider {
    PROVIDER_UNKNOWN = 0;
    PROVIDER_LIST = 1;
    PROVIDER_QUEUE = 2;
    PROVIDER_AUTOPLAY = 3;
    PROVIDER_MFT = 4;
  }

  string uri = 1;
  string uid = 2;
  .spotify.playlist.proto.ListItem.Provider provider = 3;
  .spotify.playlist.proto.ShuffleItemMetadata shuffle_item_metadata = 4;
  .spotify.playlist.proto.AuxiliaryMedia auxiliary_media = 5;
  .spotify.playlist.proto.ItemReportingContext item_reporting_context = 6;
  .spotify.playlist.proto.ListItem.MediaPreference media_preference = 7;
  .spotify.playlist.proto.FormatAttributes format_attributes = 8;
  bool hidden_in_queue = 9;
  .spotify.playlist.proto.MediaSlice slice = 10;
}

message ResolvedList {
  .spotify.playlist.proto.ListHeader header = 1;
  repeated .spotify.playlist.proto.ListItem items = 2;
}

enum EndOfListAction {
  UNKNOWN = 0;
  RESTART_PAUSED = 1;
  STOP = 2;
  WAIT = 3;
}

