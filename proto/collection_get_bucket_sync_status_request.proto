syntax = "proto3";

package spotify.collection_cosmos.proto;

option java_package = "spotify.collection.esperanto.proto";
option java_multiple_files = true;
option objc_class_prefix = "ESP";

import "status.proto";

message CollectionGetBucketSyncStatusRequest {
  string bucket_name = 1;
}

message CollectionGetBucketSyncStatusResponse {
  .spotify.collection_cosmos.proto.Status status = 1;
  bool is_synced = 2;
}

