syntax = "proto3";

package spotify.desktop.issue_reporter_esperanto.proto;

service DesktopIssueReporter {
  rpc SubmitIssue (.spotify.desktop.issue_reporter_esperanto.proto.SubmitIssueRequest) returns (.spotify.desktop.issue_reporter_esperanto.proto.SubmitIssueResponse) {}
}

message FileAttachment {
  string name = 1;
  string base64 = 2;
}

message SubmitIssueRequest {
  string summary = 1;
  string description = 2;
  string project_key = 3;
  string feature = 4;
  repeated string labels = 5;
  repeated .spotify.desktop.issue_reporter_esperanto.proto.FileAttachment files = 6;
}

message SubmitIssueResponse {
  string ticket_key = 1;
  bool success = 3;
  optional string error = 2;
}

