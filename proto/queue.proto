syntax = "proto2";

package spotify.player.proto.transfer;

import "context_track.proto";
import "google/protobuf/timestamp.proto";

message Queue {
  repeated .spotify.player.proto.ContextTrack tracks = 1;
  optional bool is_playing_queue = 2;
  optional .google.protobuf.Timestamp expiration_start_timestamp = 3;
}

