syntax = "proto3";

package spotify.automix.proto;

option java_package = "com.spotify.automix.proto";

message Cuepoint {
  int64 position_ms = 1;
  float tempo_bpm = 2;
  .spotify.automix.proto.Origin origin = 3;
  double confidence = 4;
}

message Cuepoints {
  .spotify.automix.proto.Cuepoint best_fade_in_cuepoint = 1;
  .spotify.automix.proto.Cuepoint best_fade_out_cuepoint = 2;
  repeated .spotify.automix.proto.Cuepoint fade_in_cuepoints = 3;
  repeated .spotify.automix.proto.Cuepoint fade_out_cuepoints = 4;
}

enum Origin {
  HUMAN = 0;
  ML = 1;
}

