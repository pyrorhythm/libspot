syntax = "proto3";

package spotify.your_library.proto;

option java_package = "spotify.your_library.esperanto.proto";
option java_multiple_files = true;

import "your_library_decorated_entity.proto";
import "your_library_config.proto";

message YourLibraryTagInfo {
  string tag_name = 1;
}

message YourLibraryResponseHeader {
  int32 remaining_entities = 9;
  int32 total_count = 17;
  int32 pin_count = 18;
  int32 maximum_pinned_items = 19;
  bool is_loading = 12;
  string folder_name = 15;
  string parent_folder_uri = 20;
  .spotify.your_library.proto.YourLibraryFilters available_filters = 16;
  .spotify.your_library.proto.YourLibraryTagInfo tag_info = 21;
}

message YourLibraryResponse {
  .spotify.your_library.proto.YourLibraryResponseHeader header = 1;
  repeated .spotify.your_library.proto.YourLibraryDecoratedEntity entity = 2;
  repeated .spotify.your_library.proto.YourLibraryDecoratedEntity pinned_entity = 3;
  int32 status_code = 98;
  string error = 99;
}

