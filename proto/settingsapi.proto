syntax = "proto3";

package spotify.settingsapi.v1;

message SettingEnumValue {
  string value = 1;
}

message SettingValue {
  string string_value = 4;
}

message UpdateSettingRequest {
  string setting_identifier = 1;
  .spotify.settingsapi.v1.SettingValue new_value = 2;
}

message UpdateSettingResponse {
}

