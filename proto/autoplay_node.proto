syntax = "proto2";

package spotify.player.proto;

import "logging_params.proto";

message AutoplayNode {
  message FillerNodeEntry {
    optional string key = 1;
    optional bytes value = 2;
  }

  repeated .spotify.player.proto.AutoplayNode.FillerNodeEntry filler_node = 1;
  required bool is_playing_filler = 2;
  required .spotify.player.proto.LoggingParams logging_params = 3;
  optional bool called_play_on_filler = 4;
}

