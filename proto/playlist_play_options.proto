syntax = "proto3";

package spotify.playlist.proto;

message PlayOptions {
  message SkipTo {
    string uri = 2;
    optional string uid = 1;
    optional uint32 track_index = 3;
  }

  message SeekTo {
    optional int64 position_ms = 1;
  }

  .spotify.playlist.proto.PlayOptions.SkipTo skip_to = 1;
  .spotify.playlist.proto.PlayOptions.SeekTo seek_to = 2;
  bool should_start = 3;
  string license = 4;
  repeated string lenses = 9;
  optional bool shuffle_list = 5;
  optional bool repeat_list = 6;
  optional bool repeat_item = 7;
  optional float playback_speed = 8;
  optional string session_id = 10;
  optional string original_session_id = 11;
  optional bool is_video_first = 12;
  optional string focus_uid = 13;
}

