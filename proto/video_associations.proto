syntax = "proto3";

package spotify.bumblebee.video_associations.v1;

option java_package = "com.spotify.bumblebee.VideoAssociations.v1";
option java_multiple_files = true;

message VideoAssociations {
  repeated .spotify.bumblebee.video_associations.v1.VideoAssociation video_association = 1;
}

message VideoAssociation {
  string track_uri = 1;
  .spotify.bumblebee.video_associations.v1.ImageGroup images = 2;
}

message ImageGroup {
  repeated .spotify.bumblebee.video_associations.v1.Image image = 1;
}

message Image {
  enum Size {
    DEFAULT = 0;
    SMALL = 1;
    LARGE = 2;
    XLARGE = 3;
    XXLARGE = 4;
  }

  optional bytes file_id = 1;
  optional .spotify.bumblebee.video_associations.v1.Image.Size size = 2;
  optional sint32 width = 3;
  optional sint32 height = 4;
}

