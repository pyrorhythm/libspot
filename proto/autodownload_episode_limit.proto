syntax = "proto3";

package spotify.autodownload_esperanto.proto;

option java_package = "spotify.autodownload.esperanto.proto";
option java_multiple_files = true;
option objc_class_prefix = "ESP";

message EpisodeLimitRequest {
  int32 update_throttling = 1;
}

message EpisodeLimitResponse {
  bool theres_no_limit = 1;
  int32 limit = 2;
  string error = 3;
}

