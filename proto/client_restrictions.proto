syntax = "proto3";

package spotify.clientrestrictions.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message ExternalAccessoryDescription {
  optional string integration = 1;
  optional string client_id = 2;
  optional string name = 3;
  optional string transport_type = 4;
  optional string category = 5;
  optional string company = 6;
  optional string model = 7;
  optional string version = 8;
  optional string protocol = 9;
  optional string sender_id = 10;
}

message RestrictedIntegration {
  .spotify.clientrestrictions.v1.ExternalAccessoryDescription matcher = 1;
  string restriction_id = 2;
}

message RestrictedIntegrationsPayload {
  repeated .spotify.clientrestrictions.v1.RestrictedIntegration restricted_integrations = 1;
}

message RestrictedIntegrationsRequest {
  optional string etag = 1;
}

message RestrictedIntegrationsResponse {
  string etag = 1;
  int64 cache_ttl_in_seconds = 2;
  oneof payload {
    .spotify.clientrestrictions.v1.RestrictedIntegrationsPayload payload_uncached = 3;
    .google.protobuf.Empty payload_cached = 4;
  }
}

message CachedRestrictedIntegrationsResponse {
  .spotify.clientrestrictions.v1.RestrictedIntegrationsResponse response = 1;
  .google.protobuf.Timestamp expiry_time = 2;
}

