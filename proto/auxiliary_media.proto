syntax = "proto3";

package spotify.playlist.proto;

message TtsMedia {
  oneof prompt {
    string text = 1;
    string ssml = 2;
  }
  optional string voice = 3;
  optional string tts_provider = 4;
  optional uint32 sample_rate = 5;
  optional string audio_format = 6;
  optional float loudness = 7;
  optional float true_peak = 8;
}

message AudioUrlMedia {
  string audio_url = 1;
}

message IsNarration {
}

message AuxiliaryMediaMetadata {
  optional string uri = 1;
  optional string title = 2;
  optional string album_title = 3;
  optional string artist = 4;
  optional string provider = 5;
  optional string custom_reporting_attribution = 6;
  optional string decision_id = 7;
  optional string image_default = 8;
  optional string image_small = 9;
  optional string image_large = 10;
  optional string image_xlarge = 11;
  optional .spotify.playlist.proto.IsNarration is_narration = 12;
}

message Media {
  oneof media {
    .spotify.playlist.proto.TtsMedia tts = 1;
    .spotify.playlist.proto.AudioUrlMedia audio_url = 2;
  }
}

message SkipPoint {
  optional bool is_forward_skip_target = 1;
  optional bool is_backward_skip_target = 2;
}

message AuxiliaryMediaItem {
  string uid = 1;
  .spotify.playlist.proto.Media media = 2;
  optional .spotify.playlist.proto.AuxiliaryMediaMetadata metadata = 4;
  optional bool play_once = 5;
  optional .spotify.playlist.proto.SkipPoint skip_point = 6;
}

message ListItemFade {
  int32 duration_ms = 1;
  int32 to_bed_duration_ms = 2;
  int32 from_bed_duration_ms = 3;
  float bed_gain = 4;
  optional int32 offset_ms = 5;
}

message AuxiliaryMediaItems {
  repeated .spotify.playlist.proto.AuxiliaryMediaItem items = 1;
  oneof fade {
    .spotify.playlist.proto.ListItemFade list_item_fade = 2;
  }
}

message AuxiliaryMedia {
  .spotify.playlist.proto.AuxiliaryMediaItems intro_items = 1;
  .spotify.playlist.proto.AuxiliaryMediaItems outro_items = 2;
}

