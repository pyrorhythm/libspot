syntax = "proto3";

package spotify.player.esperanto.proto;

option java_package = "com.spotify.player.esperanto.proto";
option objc_class_prefix = "ESP";

message ContextTrack {
  message MetadataEntry {
    string key = 1;
    string value = 2;
  }

  string uri = 1;
  string uid = 2;
  repeated .spotify.player.esperanto.proto.ContextTrack.MetadataEntry metadata = 3;
}

