syntax = "proto3";

package spotify.automix.proto;

option java_package = "com.spotify.automix.proto";

message Point {
  double x = 1;
  double y = 2;
}

message AutomationCurve {
  repeated .spotify.automix.proto.Point points = 1;
  double start = 2;
  double end = 3;
}

message AutomationCurves {
  reserved 2;
  repeated .spotify.automix.proto.AutomationCurve curves = 1;
  double minimum = 3;
  double maximum = 4;
}

message VolumeStyle {
  int32 id = 1;
}

message VolumeStyleCurves {
  .spotify.automix.proto.VolumeStyle style = 1;
  optional .spotify.automix.proto.AutomationCurves fade_out_curves = 2;
  optional .spotify.automix.proto.AutomationCurves fade_in_curves = 3;
}

message EqStyle {
  int32 id = 1;
}

message EqStyleCurves {
  .spotify.automix.proto.EqStyle style = 1;
  optional .spotify.automix.proto.AutomationCurves low_eq_out_curves = 2;
  optional .spotify.automix.proto.AutomationCurves mid_eq_out_curves = 3;
  optional .spotify.automix.proto.AutomationCurves high_eq_out_curves = 4;
  optional .spotify.automix.proto.AutomationCurves low_eq_in_curves = 5;
  optional .spotify.automix.proto.AutomationCurves mid_eq_in_curves = 6;
  optional .spotify.automix.proto.AutomationCurves high_eq_in_curves = 7;
}

message FilterFxStyle {
  int32 id = 1;
}

message FilterFxStyleCurves {
  .spotify.automix.proto.FilterFxStyle style = 1;
  optional .spotify.automix.proto.AutomationCurves filter_cutoff_out_curves = 2;
  optional .spotify.automix.proto.AutomationCurves filter_resonance_out_curves = 3;
  optional .spotify.automix.proto.AutomationCurves filter_cutoff_in_curves = 4;
  optional .spotify.automix.proto.AutomationCurves filter_resonance_in_curves = 5;
}

message FxStyle {
  int32 id = 1;
}

message FxStyleCurves {
  .spotify.automix.proto.FxStyle style = 1;
  optional .spotify.automix.proto.AutomationCurves echo_dry_wet_out_curves = 2;
  optional .spotify.automix.proto.AutomationCurves echo_dry_wet_in_curves = 3;
  optional .spotify.automix.proto.AutomationCurves reverb_dry_wet_out_curves = 4;
  optional .spotify.automix.proto.AutomationCurves reverb_dry_wet_in_curves = 5;
  optional .spotify.automix.proto.AutomationCurves delay_dry_wet_out_curves = 6;
  optional .spotify.automix.proto.AutomationCurves delay_dry_wet_in_curves = 7;
}

message EqCurveOverrides {
  optional .spotify.automix.proto.AutomationCurves low = 1;
  optional .spotify.automix.proto.AutomationCurves mid = 2;
  optional .spotify.automix.proto.AutomationCurves high = 3;
}

message FilterCurveOverrides {
  optional .spotify.automix.proto.AutomationCurves cutoff = 1;
  optional .spotify.automix.proto.AutomationCurves resonance = 2;
}

message FxCurveOverrides {
  optional .spotify.automix.proto.AutomationCurves echo_dry_wet = 1;
  optional .spotify.automix.proto.AutomationCurves reverb_dry_wet = 2;
  optional .spotify.automix.proto.AutomationCurves delay_dry_wet = 3;
}

message Preset {
  int32 id = 1;
  .spotify.automix.proto.PresetType type = 2;
  optional .spotify.automix.proto.VolumeStyle volume_style_override = 3;
  optional .spotify.automix.proto.EqStyle eq_style_override = 4;
  optional .spotify.automix.proto.FilterFxStyle filter_fx_style_override = 5;
  optional .spotify.automix.proto.AutomationCurves volume_out_curve_override = 6;
  optional .spotify.automix.proto.AutomationCurves volume_in_curve_override = 7;
  optional .spotify.automix.proto.EqCurveOverrides eq_out_curve_overrides = 8;
  optional .spotify.automix.proto.EqCurveOverrides eq_in_curve_overrides = 9;
  optional .spotify.automix.proto.FilterCurveOverrides filter_out_curve_overrides = 10;
  optional .spotify.automix.proto.FilterCurveOverrides filter_in_curve_overrides = 11;
  optional .spotify.automix.proto.FxStyle fx_style_override = 12;
  optional .spotify.automix.proto.FxCurveOverrides fx_out_curve_overrides = 13;
  optional .spotify.automix.proto.FxCurveOverrides fx_in_curve_overrides = 14;
}

message Overlap {
  string track_a_row_id = 1;
  string track_b_row_id = 2;
  int32 start_a_ms = 3;
  int32 start_b_ms = 4;
  int32 duration_ms = 5;
  bool is_beatmatched = 9;
  string track_a_uri = 10;
  string track_b_uri = 11;
  string track_a_playable_uri = 12;
  string track_b_playable_uri = 13;
  string track_a_playable_beats_hash = 14;
  string track_b_playable_beats_hash = 15;
  float bpm_a = 16;
  float bpm_b = 17;
  optional float speed_a = 6;
  optional float speed_b = 7;
  optional int32 duration_bars = 8;
}

message Transition {
  .spotify.automix.proto.Overlap overlap = 1;
  .spotify.automix.proto.Preset preset = 2;
  bool is_overlap_override = 3;
  bool is_preset_id_override = 4;
}

enum PresetType {
  PRESET_TYPE_UNSPECIFIED = 0;
  PRESET_TYPE_FADE = 1;
  PRESET_TYPE_CUT = 2;
  PRESET_TYPE_BEATMATCHED_FADE = 3;
  PRESET_TYPE_BEATMATCHED_CUT = 4;
}

