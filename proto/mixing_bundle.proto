syntax = "proto3";

package spotify.automix.bundle.proto;

message Point {
  double x = 1;
  double y = 2;
}

message AutomationCurve {
  repeated .spotify.automix.bundle.proto.Point points = 1;
  double start = 2;
  double end = 3;
}

message AutomationCurves {
  repeated .spotify.automix.bundle.proto.AutomationCurve curves = 1;
  double minimum = 2;
  double maximum = 3;
}

message SalesPeriod {
  int64 start = 1;
  int64 end = 2;
}

message Identifier {
  int32 id = 1;
  string string_id = 2;
  optional .spotify.automix.bundle.proto.SalesPeriod sales_period = 3;
}

message PresetDefinition {
  int32 volume_style_out_id = 1;
  int32 volume_style_in_id = 2;
  int32 eq_style_out_id = 3;
  int32 eq_style_in_id = 4;
  int32 filter_style_out_id = 5;
  int32 filter_style_in_id = 6;
  int32 fx_style_out_id = 7;
  int32 fx_style_in_id = 8;
}

message LegacyPresetDefinition {
  int32 volume_style_id = 1;
  int32 eq_style_id = 2;
  int32 filter_fx_style_id = 3;
}

message LegacyVolumeStyleMapping {
  int32 volume_style_id = 1;
  int32 volume_style_out_id = 2;
  int32 volume_style_in_id = 3;
}

message LegacyEqStyleMapping {
  int32 eq_style_id = 1;
  int32 eq_style_out_id = 2;
  int32 eq_style_in_id = 3;
}

message LegacyFilterFxStyleMapping {
  int32 filter_fx_style_id = 1;
  int32 filter_style_out_id = 2;
  int32 filter_style_in_id = 3;
  int32 fx_style_out_id = 4;
  int32 fx_style_in_id = 5;
}

message Preset {
  .spotify.automix.bundle.proto.Identifier identifier = 1;
  .spotify.automix.bundle.proto.PresetDefinition definition = 2;
  optional .spotify.automix.bundle.proto.LegacyPresetDefinition legacy_definition = 3;
}

message VolumeAutomation {
  int32 num_bars = 1;
  .spotify.automix.bundle.proto.AutomationCurves volume = 2;
}

message VolumeStyle {
  .spotify.automix.bundle.proto.Identifier identifier = 1;
  repeated .spotify.automix.bundle.proto.VolumeAutomation automation = 2;
}

message EqAutomation {
  int32 num_bars = 1;
  .spotify.automix.bundle.proto.AutomationCurves low = 2;
  .spotify.automix.bundle.proto.AutomationCurves mid = 3;
  .spotify.automix.bundle.proto.AutomationCurves high = 4;
}

message EqStyle {
  .spotify.automix.bundle.proto.Identifier identifier = 1;
  repeated .spotify.automix.bundle.proto.EqAutomation automation = 2;
}

message FilterAutomation {
  int32 num_bars = 1;
  .spotify.automix.bundle.proto.AutomationCurves cutoff = 2;
  .spotify.automix.bundle.proto.AutomationCurves resonance = 3;
}

message FilterStyle {
  .spotify.automix.bundle.proto.Identifier identifier = 1;
  repeated .spotify.automix.bundle.proto.FilterAutomation automation = 4;
}

message FxAutomation {
  int32 num_bars = 1;
  .spotify.automix.bundle.proto.AutomationCurves todo = 2;
}

message FxStyle {
  .spotify.automix.bundle.proto.Identifier identifier = 1;
  repeated .spotify.automix.bundle.proto.FxAutomation automation = 2;
}

message LegacyVolumeStyle {
  .spotify.automix.bundle.proto.Identifier identifier = 1;
}

message LegacyEqStyle {
  .spotify.automix.bundle.proto.Identifier identifier = 1;
}

message LegacyFilterFxStyle {
  .spotify.automix.bundle.proto.Identifier identifier = 1;
}

message MixingBundle {
  repeated .spotify.automix.bundle.proto.Preset presets = 1;
  repeated .spotify.automix.bundle.proto.VolumeStyle volume_styles_out = 2;
  repeated .spotify.automix.bundle.proto.VolumeStyle volume_styles_in = 3;
  repeated .spotify.automix.bundle.proto.EqStyle eq_styles_out = 4;
  repeated .spotify.automix.bundle.proto.EqStyle eq_styles_in = 5;
  repeated .spotify.automix.bundle.proto.FilterStyle filter_styles_out = 6;
  repeated .spotify.automix.bundle.proto.FilterStyle filter_styles_in = 7;
  repeated .spotify.automix.bundle.proto.FxStyle fx_styles_out = 8;
  repeated .spotify.automix.bundle.proto.FxStyle fx_styles_in = 9;
  repeated .spotify.automix.bundle.proto.LegacyVolumeStyleMapping legacy_volume_style_mappings = 10;
  repeated .spotify.automix.bundle.proto.LegacyEqStyleMapping legacy_eq_style_mappings = 11;
  repeated .spotify.automix.bundle.proto.LegacyFilterFxStyleMapping legacy_filter_fx_style_mappings = 12;
  repeated .spotify.automix.bundle.proto.LegacyVolumeStyle legacy_volume_styles = 13;
  repeated .spotify.automix.bundle.proto.LegacyEqStyle legacy_eq_styles = 14;
  repeated .spotify.automix.bundle.proto.LegacyFilterFxStyle legacy_filter_fx_styles = 15;
}

