syntax = "proto3";

package spotify.concerts.metadata.v1;

message DateWithOffset {
  string date = 1;
  int32 utc_offset_in_minutes = 2;
}

message ConcertTimes {
  .spotify.concerts.metadata.v1.DateWithOffset start_time = 1;
}

message Concert {
  string uri = 1;
  string title = 2;
  .spotify.concerts.metadata.v1.ConcertTimes times = 3;
}

