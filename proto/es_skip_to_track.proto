syntax = "proto3";

package spotify.player.esperanto.proto;

option java_package = "com.spotify.player.esperanto.proto";
option objc_class_prefix = "ESP";

import "es_optional.proto";

message SkipToTrack {
  string page_url = 1;
  .spotify.player.esperanto.proto.OptionalInt64 page_index = 2;
  string track_uid = 3;
  string track_uri = 4;
  .spotify.player.esperanto.proto.OptionalInt64 track_index = 5;
}

