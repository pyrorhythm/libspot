syntax = "proto3";

package spotify.playlist_cache.proto;

option java_package = "com.spotify.playlist.proto";

import "playlist_api.proto";
import "playlist_permission.proto";
import "cache_hint.proto";
import "google/protobuf/timestamp.proto";

message ContextSyncErrorCode {
  optional int32 code = 1;
}

message CacheHintInfo {
  optional .spotify.playlist.messages.CacheHint cache_hint = 1;
  optional .google.protobuf.Timestamp last_updated_timestamp = 2;
}

message PlaylistCacheInfo {
  optional int32 cache_producer_version = 1;
  optional bool cache_refresh_needed = 2;
  optional bool headless_state = 3;
  optional .spotify.playlist_cache.proto.ContextSyncErrorCode error_code = 4;
  optional .spotify.playlist_cache.proto.CacheHintInfo cache_hint_info = 5;
  optional uint32 content_generation_version = 6;
}

message PendingPlaylistChanges {
  repeated .spotify.playlist4.proto.Delta changes = 1;
}

message AdditionalData {
  repeated string requested_lenses = 1;
}

message Playlist {
  optional .spotify.playlist_cache.proto.PlaylistCacheInfo cache_info = 1;
  optional .spotify.playlist4.proto.SelectedListContent selected_list_content = 2;
  optional .spotify.playlist_permission.proto.GetMemberPermissionsResponse playlist_members = 3;
  optional .spotify.playlist_cache.proto.PendingPlaylistChanges pending_changes = 4;
  optional .spotify.playlist_cache.proto.AdditionalData additional_data = 6;
  optional .spotify.playlist_permission.proto.Permissions permissions = 7;
}

message GeneralInfo {
  optional bool personalized_lists_disabled = 1;
  optional .spotify.playlist_permission.proto.DefaultOwnerCapabilitiesResponse owner_capabilities_response = 2;
  optional .google.protobuf.Timestamp owner_capabilities_expires_at = 3;
  optional uint32 current_content_generation_version = 4;
}

