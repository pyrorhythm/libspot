syntax = "proto3";

package spotify.contentagnostic.v2;

option java_package = "com.spotify.contentagnostic.v2";
option java_multiple_files = true;

message IdentityTrait {
  string type = 1;
  string name = 2;
  repeated .spotify.contentagnostic.v2.ContributorReference contributors = 5;
  optional string description = 3;
  optional .spotify.contentagnostic.v2.EntityReference content_hierarchy_parent = 4;
}

message ContributorReference {
  string name = 1;
  optional string uri = 2;
}

message EntityReference {
  string name = 1;
  string uri = 2;
}

