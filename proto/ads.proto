syntax = "proto3";

package spotify.ads.esperanto.proto;

option java_package = "com.spotify.ads.esperanto.proto";
option java_multiple_files = true;
option objc_class_prefix = "ESP";

import "ad_common.proto";

service Ads {
  rpc GetAds (.spotify.ads.esperanto.proto.GetAdsRequest) returns (.spotify.ads.esperanto.proto.GetAdsResponse) {}
}

message GetAdsRequest {
  message TargetingEntry {
    string key = 1;
    string value = 2;
  }

  string slot_id = 1;
  repeated .spotify.ads.esperanto.proto.GetAdsRequest.TargetingEntry targeting = 2;
}

message GetAdsResponse {
  message AdPackageEntry {
    string key = 1;
    .spotify.ads.esperanto.proto.AdQueue value = 2;
  }

  repeated .spotify.ads.esperanto.proto.GetAdsResponse.AdPackageEntry ad_package = 1;
  optional string error = 2;
}

