syntax = "proto3";

package spotify.clienttoken.serialization.v0;

option java_package = "spotify.clienttoken.serialization.v0";
option java_multiple_files = true;

message TokenDomain {
  string domain = 1;
}

message ClientToken {
  string token = 1;
  int64 expires_at_timestamp = 2;
  int64 refresh_at_timestamp = 3;
  repeated .spotify.clienttoken.serialization.v0.TokenDomain domains = 4;
}

