syntax = "proto3";

package spotify.remote_config.esperanto.proto;

option java_package = "com.spotify.remoteconfig.esperanto.proto";
option objc_class_prefix = "ESP";

service RemoteConfigDummyResolve {
  rpc ResolveDummyProperty (.spotify.remote_config.esperanto.proto.ResolveDummyRequest) returns (.spotify.remote_config.esperanto.proto.ResolveDummyResponse) {}
}

message ResolveDummyRequest {
}

message ResolveDummyResponse {
  string value = 1;
}

