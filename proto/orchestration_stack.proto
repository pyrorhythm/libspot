  ORCHESTRATION_STACK_LIST_PLAYER = 1;
  ORCHESTRATION_STACK_CONTEXT_PLAYER = 2;
  ORCHESTRATION_STACK_MULTIPLAYER = 3;
  ORCHESTRATION_STACK_STANDALONE = 4;
