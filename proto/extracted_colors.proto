syntax = "proto3";

package spotify.context_track_color;

message ColorResult {
  .spotify.context_track_color.Color color_raw = 1;
  .spotify.context_track_color.Color color_light = 2;
  .spotify.context_track_color.Color color_dark = 3;
  .spotify.context_track_color.Status status = 5;
}

message Color {
  int32 rgb = 1;
  bool is_fallback = 2;
}

enum Status {
  OK = 0;
  IN_PROGRESS = 1;
  INVALID_URL = 2;
  INTERNAL = 3;
}

