syntax = "proto3";

package spotify.debug_tracer.proto;

option java_package = "com.spotify.stream_reporting_debug_tracer_esperanto.proto";
option java_multiple_files = true;
option objc_class_prefix = "ESP";

service DebugTracerService {
  rpc trace (.spotify.debug_tracer.proto.DebugTracerRequest) returns (.spotify.debug_tracer.proto.DebugTracerResponse) {}
  rpc trace_playback_id (.spotify.debug_tracer.proto.DebugTracerPlaybackIdRequest) returns (.spotify.debug_tracer.proto.DebugTracerResponse) {}
  rpc trace_stream_handle (.spotify.debug_tracer.proto.DebugTracerStreamHandleRequest) returns (.spotify.debug_tracer.proto.DebugTracerResponse) {}
}

message DebugTracerRequest {
  .spotify.debug_tracer.proto.DebugTracePoint debug_trace_point = 1;
  bytes playback_id = 2;
  uint32 raw_stream_handle = 3;
}

message DebugTracerPlaybackIdRequest {
  .spotify.debug_tracer.proto.DebugTracePoint debug_trace_point = 1;
  bytes playback_id = 2;
}

message DebugTracerStreamHandleRequest {
  .spotify.debug_tracer.proto.DebugTracePoint debug_trace_point = 1;
  uint32 raw_stream_handle = 2;
}

message DebugTracerResponse {
}

