syntax = "proto3";

package spotify.player.esperanto.proto;

option java_package = "com.spotify.player.esperanto.proto";
option objc_class_prefix = "ESP";

import "es_command_options.proto";
import "es_logging_params.proto";

message StopRequest {
  enum Reason {
    INTERACTIVE = 0;
    REMOTE_TRANSFER = 1;
    SHUTDOWN = 2;
  }

  .spotify.player.esperanto.proto.CommandOptions options = 1;
  .spotify.player.esperanto.proto.StopRequest.Reason reason = 2;
  .spotify.player.esperanto.proto.LoggingParams logging_params = 3;
}

