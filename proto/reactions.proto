syntax = "proto3";

package spotify.reactions.v1;

option java_package = "com.spotify.reactions.v1.proto";
option java_outer_classname = "ReactionsProto";
option java_multiple_files = true;

message SingleReactionMetadata {
  .spotify.reactions.v1.ReactionType reaction_type = 1;
  int64 count = 2;
  bool has_reacted = 3;
}

message ReactionsMetadata {
  repeated .spotify.reactions.v1.SingleReactionMetadata reaction_metadata = 1;
  bool is_podcast_short = 2;
}

enum ReactionType {
  LIKE = 0;
}

