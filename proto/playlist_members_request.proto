syntax = "proto3";

package spotify.playlist_esperanto.proto;

option java_package = "spotify.playlist.esperanto.proto";
option java_multiple_files = true;
option objc_class_prefix = "ESP";

import "members_response.proto";
import "response_status.proto";

message PlaylistMembersResponse {
  .spotify.playlist_esperanto.proto.ResponseStatus status = 1;
  .spotify.playlist.cosmos.proto.PlaylistMembersResponse response = 2;
}

