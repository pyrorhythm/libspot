syntax = "proto2";

package spotify.playlist.cosmos.proto;

option java_package = "com.spotify.playlist.policy.proto";
option java_multiple_files = true;

import "policy/folder_decoration_policy.proto";

message RootlistFolderDecorationPolicy {
  optional bool add_time = 1;
  optional .spotify.playlist.cosmos.proto.FolderDecorationPolicy folder = 2;
  optional bool group_label = 3;
}

