syntax = "proto3";

package spotify.playlist.cosmos.proto;

option java_package = "com.spotify.playlist.policy.proto";
option java_multiple_files = true;

import "policy/album_decoration_policy.proto";
import "policy/artist_decoration_policy.proto";

message PlaylistAlbumDecorationPolicy {
  .spotify.cosmos_util.proto.AlbumDecorationPolicy album = 1;
  .spotify.cosmos_util.proto.ArtistDecorationPolicy artist = 2;
}

