syntax = "proto2";

package spotify.playlist.cosmos.proto;

option java_package = "com.spotify.playlist.policy.proto";
option java_multiple_files = true;

import "policy/playlist_decoration_policy.proto";

message RootlistPlaylistDecorationPolicy {
  optional bool add_time = 1;
  optional .spotify.playlist.cosmos.proto.PlaylistDecorationPolicy playlist = 2;
  optional bool group_label = 3;
}

