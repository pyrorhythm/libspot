syntax = "proto3";

package spotify.collection.proto.v2;

option java_package = "com.spotify.collection2.v2.proto";

import "collection_itemdata.proto";

message PageRequest {
  string username = 1;
  string set = 2;
  string pagination_token = 3;
  int32 limit = 4;
}

message CollectionItem {
  string uri = 1;
  int32 added_at = 2;
  bool is_removed = 3;
  optional string context_uri = 4;
  optional .spotify.collection.itemdata.ItemData item_data = 5;
}

message PageResponse {
  repeated .spotify.collection.proto.v2.CollectionItem items = 1;
  string next_page_token = 2;
  string sync_token = 3;
}

message DeltaRequest {
  string username = 1;
  string set = 2;
  string last_sync_token = 3;
}

message DeltaResponse {
  bool delta_update_possible = 1;
  repeated .spotify.collection.proto.v2.CollectionItem items = 2;
  string sync_token = 3;
}

message WriteRequest {
  string username = 1;
  string set = 2;
  repeated .spotify.collection.proto.v2.CollectionItem items = 3;
  string client_update_id = 4;
}

message InitializedRequest {
  string username = 1;
  string set = 2;
}

message InitializedResponse {
  bool initialized = 1;
}

