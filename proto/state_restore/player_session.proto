syntax = "proto2";

package spotify.player.proto.state_restore;

import "context_track.proto";
import "context_player_options.proto";
import "logging_params.proto";
import "play_origin.proto";
import "player_license.proto";
import "prepare_play_options.proto";
import "state_restore/context_loader.proto";
import "state_restore/context_player_rules.proto";
import "state_restore/playback_state.proto";
import "state_restore/player_session_fake.proto";
import "state_restore/provided_track.proto";

message PlayerSession {
  required .spotify.player.proto.PreparePlayOptions prepare_play_options = 1;
  optional .spotify.player.proto.state_restore.PlaybackState playback_state = 2;
  optional .spotify.player.proto.state_restore.ProvidedTrack track = 3;
  optional .spotify.player.proto.ContextTrack track_to_skip_to = 4;
  optional bytes given_playback_id = 5;
  required .spotify.player.proto.LoggingParams next_command_logging_params = 6;
  required .spotify.player.proto.LoggingParams curr_command_logging_params = 7;
  required .spotify.player.proto.PlayOrigin play_origin = 8;
  required bool is_playing = 9;
  required bool is_paused = 10;
  required bool is_system_initiated = 11;
  required bool is_finished = 12;
  required .spotify.player.proto.ContextPlayerOptions options = 13;
  required uint64 playback_seed = 14;
  required int32 num_advances = 15;
  required bool did_skip_prev = 16;
  required .spotify.player.proto.PlayerLicense license = 17;
  required .spotify.player.proto.state_restore.ContextPlayerRules rules = 18;
  required .spotify.player.proto.state_restore.ContextLoader loader = 19;
  optional .spotify.player.proto.state_restore.PlayerSessionFake fake = 100;
}

