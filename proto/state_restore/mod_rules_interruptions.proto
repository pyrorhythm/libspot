syntax = "proto2";

package spotify.player.proto.state_restore;

import "player_license.proto";
import "state_restore/provided_track.proto";

message ModRulesInterruptions {
  enum InterruptionSource {
    CONTEXT = 1;
    SAS = 2;
    NO_INTERRUPTIONS = 3;
  }

  optional .spotify.player.proto.state_restore.ProvidedTrack seek_repeat_track = 1;
  required uint32 prng_seed = 2;
  required bool support_video = 3;
  required bool is_active_action = 4;
  required bool is_in_seek_repeat = 5;
  required bool has_tp_api_restrictions = 6;
  required .spotify.player.proto.state_restore.ModRulesInterruptions.InterruptionSource interruption_source = 7;
  required .spotify.player.proto.PlayerLicense license = 8;
}

