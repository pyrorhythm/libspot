syntax = "proto3";

package spotify.ads.proto;

option java_package = "com.spotify.ads.companions.v1";
option java_multiple_files = true;

message SurveyQuestionOption {
  string id = 1;
  string primary_text = 2;
  bool is_exclusive = 3;
}

message SurveyQuestion {
  string id = 1;
  .spotify.ads.proto.SurveyQuestionType survey_question_type = 2;
  string primary_text = 3;
  string secondary_text = 4;
  repeated .spotify.ads.proto.SurveyQuestionOption survey_question_options = 5;
}

message SurveyTransparencyContent {
  string transparency_label = 1;
  string transparency_url = 2;
}

message Survey {
  repeated .spotify.ads.proto.SurveyQuestion survey_questions = 1;
  .spotify.ads.proto.SurveyTransparencyContent survey_transparency_content = 2;
}

message CanvasImage {
  string media_type = 1;
  uint32 width = 2;
  uint32 height = 3;
  oneof media_file {
    string url = 4;
  }
}

message CanvasVideo {
  string media_type = 1;
  uint32 duration_seconds = 2;
  uint32 width = 3;
  uint32 height = 4;
  oneof media_file {
    string url = 5;
    string video_manifest_id = 6;
  }
}

message ItemPrice {
  string price = 1;
}

message ItemSalePrice {
  string price = 1;
  string sale_price = 2;
}

message CarouselImage {
  int32 width = 1;
  int32 height = 2;
  string mime_type = 3;
  oneof media_file {
    string url = 4;
    string image_file_id = 5;
  }
}

message CarouselVideo {
  int32 width = 1;
  int32 height = 2;
  int32 bitrate = 3;
  string mime_type = 4;
  uint64 duration = 5;
  oneof media_file {
    string url = 6;
    string video_manifest_id = 7;
  }
}

message CarouselItem {
  string item_id = 1;
  string tagline = 2;
  string clickthrough_url = 3;
  oneof media {
    .spotify.ads.proto.CarouselImage image = 4;
    .spotify.ads.proto.CarouselVideo video = 5;
  }
  oneof pricing {
    .spotify.ads.proto.ItemPrice price = 6;
    .spotify.ads.proto.ItemSalePrice sale_price = 7;
  }
}

message Carousel {
  string carousel_id = 1;
  repeated .spotify.ads.proto.CarouselItem items = 2;
}

message Companion {
  oneof type {
    .spotify.ads.proto.CanvasImage canvas_image = 1;
    .spotify.ads.proto.CanvasVideo canvas_video = 2;
    .spotify.ads.proto.Survey survey = 3;
    .spotify.ads.proto.Carousel carousel = 4;
  }
}

message CompanionAd {
  repeated .spotify.ads.proto.Companion companions = 16;
}

enum SurveyQuestionType {
  SURVEY_QUESTION_TYPE_UNKNOWN = 0;
  SINGLE_SELECT = 1;
  MULTI_SELECT = 2;
}

