syntax = "proto3";

package spotify.automix.bundle.esperanto.proto;

option java_package = "com.spotify.automix.bundle.esperanto.proto";
option objc_class_prefix = "ESP";

import "mixing_bundle.proto";

service AutomixBundle {
  rpc GetMixingBundle (.spotify.automix.bundle.esperanto.proto.GetMixingBundleRequest) returns (.spotify.automix.bundle.esperanto.proto.GetMixingBundleResponse) {}
}

message GetMixingBundleRequest {
}

message GetMixingBundleResponse {
  .spotify.automix.bundle.proto.MixingBundle mixing_bundle = 1;
}

