syntax = "proto3";

package spotify.assoc.v1;

option java_package = "com.spotify.assoc.v1.proto";
option java_outer_classname = "EntityAssociationsExtensionProto";
option java_multiple_files = true;

message Assoc {
  enum AssocType {
    ASSOC_TYPE_UNSPECIFIED = 0;
    IS_PRIMARILY_ABOUT = 1;
    HAS_RELATED_CONTENT = 2;
  }

  .spotify.assoc.v1.Assoc.AssocType assoc_type = 1;
  repeated string target_uri = 2;
}

message EntityAssociations {
  string origin_uri = 1;
  repeated .spotify.assoc.v1.Assoc assoc = 2;
}

