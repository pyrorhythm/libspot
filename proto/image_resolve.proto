syntax = "proto3";

package spotify.imageresolve.proto;

option java_package = "com.spotify.imageresolve.proto";
option java_outer_classname = "ImageResolveProtos";
option java_multiple_files = true;
option objc_class_prefix = "SPTImage";

message Collection {
  message Projection {
    bytes id = 2;
    int32 metadata_index = 3;
    int32 url_template_index = 4;
  }

  bytes id = 1;
  repeated .spotify.imageresolve.proto.Collection.Projection projections = 2;
}

message ProjectionMetadata {
  int32 width = 2;
  int32 height = 3;
  bool fetch_online = 4;
  bool download_for_offline = 5;
}

message ProjectionMap {
  repeated string url_templates = 1;
  repeated .spotify.imageresolve.proto.ProjectionMetadata projection_metas = 2;
  repeated .spotify.imageresolve.proto.Collection collections = 3;
}

message ProjectionsResponse {
  .spotify.imageresolve.proto.ProjectionMap projection_map = 1;
}

