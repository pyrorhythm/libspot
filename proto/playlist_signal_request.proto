syntax = "proto3";

package spotify.playlist_esperanto.proto;

option java_package = "spotify.playlist.esperanto.proto";
option java_multiple_files = true;
option objc_class_prefix = "ESP";

import "response_status.proto";

message Signal {
  string identifier = 1;
  bytes signal_data = 2;
  bytes client_payload = 3;
  bool force = 4;
}

message PlaylistMultiSignalRequest {
  string list_uri = 1;
  repeated .spotify.playlist_esperanto.proto.Signal signals = 2;
  repeated string lenses = 3;
}

message PlaylistMultiItemSignalRequest {
  string item_id = 1;
  string list_uri = 2;
  repeated .spotify.playlist_esperanto.proto.Signal signals = 3;
}

message PlaylistItemSignalResponse {
  .spotify.playlist_esperanto.proto.ResponseStatus status = 1;
}

message PlaylistSignalResponse {
  .spotify.playlist_esperanto.proto.ResponseStatus status = 1;
}

