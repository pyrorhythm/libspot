syntax = "proto3";

package spotify.playback_platform.timeline.v1;

option java_package = "spotify.playback_platform.timeline.v1";
option java_multiple_files = true;

message TimelineQuery {
  repeated string include_uids = 1;
  repeated string exclude_uids = 2;
  repeated uint64 include_tags = 3;
  repeated uint64 exclude_tags = 4;
}

