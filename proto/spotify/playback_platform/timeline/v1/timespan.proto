syntax = "proto3";

package spotify.playback_platform.timeline.v1;

option java_package = "spotify.playback_platform.timeline.v1";
option java_multiple_files = true;

import "spotify/playback_platform/common/v1/duration.proto";
import "spotify/playback_platform/media/v1/manifests.proto";
import "spotify/playback_platform/timeline/v1/timeline_behavior.proto";
import "spotify/playback_platform/timeline/v1/timeline_metadata.proto";
import "spotify/playback_platform/timeline/v1/timepoint.proto";

message Timespan {
  message Empty {
    .spotify.playback_platform.timeline.v1.Timepoint begin = 1;
    .spotify.playback_platform.timeline.v1.Timepoint end = 2;
  }

  message Track {
    oneof position {
      .spotify.playback_platform.timeline.v1.Timepoint begin = 1;
      .spotify.playback_platform.timeline.v1.Timepoint end = 2;
    }
    oneof media {
      bytes spotify_track_gid = 3;
      bytes episode_track_gid = 4;
    }
    optional .spotify.playback_platform.media.v1.TrackManifest manifest = 5;
    optional .spotify.playback_platform.timeline.v1.Timespan.Slice slice = 6;
  }

  message Local {
    reserved "manifest";
    reserved 4;
    string local_id = 3;
    oneof position {
      .spotify.playback_platform.timeline.v1.Timepoint begin = 1;
      .spotify.playback_platform.timeline.v1.Timepoint end = 2;
    }
    optional .spotify.playback_platform.timeline.v1.Timespan.Slice slice = 5;
  }

  message Audio {
    bytes audio_id = 3;
    oneof position {
      .spotify.playback_platform.timeline.v1.Timepoint begin = 1;
      .spotify.playback_platform.timeline.v1.Timepoint end = 2;
    }
    optional .spotify.playback_platform.media.v1.AudioManifest manifest = 4;
    optional .spotify.playback_platform.timeline.v1.Timespan.Slice slice = 5;
  }

  message Video {
    bytes video_id = 3;
    oneof position {
      .spotify.playback_platform.timeline.v1.Timepoint begin = 1;
      .spotify.playback_platform.timeline.v1.Timepoint end = 2;
    }
    optional .spotify.playback_platform.media.v1.VideoManifest manifest = 4;
    optional .spotify.playback_platform.timeline.v1.Timespan.Slice slice = 5;
  }

  message GeneratedAudio {
    bytes media_id = 4;
    oneof position {
      .spotify.playback_platform.timeline.v1.Timepoint begin = 1;
      .spotify.playback_platform.timeline.v1.Timepoint end = 2;
    }
    optional string format_id = 3;
    optional .spotify.playback_platform.media.v1.GeneratedAudioManifest manifest = 5;
    optional .spotify.playback_platform.timeline.v1.Timespan.Slice slice = 6;
  }

  message GeneratedVideo {
    bytes media_id = 4;
    oneof position {
      .spotify.playback_platform.timeline.v1.Timepoint begin = 1;
      .spotify.playback_platform.timeline.v1.Timepoint end = 2;
    }
    optional string format_id = 3;
    optional .spotify.playback_platform.media.v1.GeneratedVideoManifest manifest = 5;
    optional .spotify.playback_platform.timeline.v1.Timespan.Slice slice = 6;
  }

  message StreamingAudio {
    .spotify.playback_platform.timeline.v1.Timepoint begin = 1;
    bytes stream_id = 2;
    optional .spotify.playback_platform.media.v1.StreamingAudioManifest manifest = 3;
  }

  message StreamingVideo {
    .spotify.playback_platform.timeline.v1.Timepoint begin = 1;
    bytes stream_id = 2;
    optional .spotify.playback_platform.media.v1.StreamingVideoManifest manifest = 3;
  }

  message Slice {
    oneof in_point {
      .spotify.playback_platform.common.v1.Duration in = 1;
      .spotify.playback_platform.common.v1.Duration in_offset_by_duration = 2;
    }
    oneof out_point {
      .spotify.playback_platform.common.v1.Duration out = 3;
      .spotify.playback_platform.common.v1.Duration out_offset_by_duration = 4;
    }
  }

  .spotify.playback_platform.timeline.v1.TimelineBehavior timeline_behavior = 1;
  .spotify.playback_platform.timeline.v1.TimelineMetadata timeline_metadata = 2;
  repeated uint64 tags = 4;
  oneof media {
    .spotify.playback_platform.timeline.v1.Timespan.Empty empty = 5;
    .spotify.playback_platform.timeline.v1.Timespan.Track track = 6;
    .spotify.playback_platform.timeline.v1.Timespan.Local local = 7;
    .spotify.playback_platform.timeline.v1.Timespan.Audio audio = 8;
    .spotify.playback_platform.timeline.v1.Timespan.Video video = 9;
    .spotify.playback_platform.timeline.v1.Timespan.GeneratedAudio generated_audio = 12;
    .spotify.playback_platform.timeline.v1.Timespan.GeneratedVideo generated_video = 13;
    .spotify.playback_platform.timeline.v1.Timespan.StreamingAudio streaming_audio = 14;
    .spotify.playback_platform.timeline.v1.Timespan.StreamingVideo streaming_video = 15;
  }
  optional string uid = 3;
}

