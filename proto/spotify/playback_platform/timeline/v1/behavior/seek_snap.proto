syntax = "proto3";

package spotify.playback_platform.timeline.v1.behavior;

option java_package = "spotify.playback_platform.timeline.v1.behavior";
option java_multiple_files = true;

import "spotify/playback_platform/common/v1/duration.proto";
import "spotify/playback_platform/timeline/v1/timepoint.proto";

message SeekSnap {
  message Guide {
    .spotify.playback_platform.timeline.v1.Timepoints snap_positions = 1;
    .spotify.playback_platform.common.v1.Duration radius = 2;
  }

  repeated .spotify.playback_platform.timeline.v1.behavior.SeekSnap.Guide guides = 1;
  optional float cutoff = 2;
}

