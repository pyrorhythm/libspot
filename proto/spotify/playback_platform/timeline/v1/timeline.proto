syntax = "proto3";

package spotify.playback_platform.timeline.v1;

option java_package = "spotify.playback_platform.timeline.v1";
option java_multiple_files = true;

import "spotify/playback_platform/timeline/v1/timepoint.proto";
import "spotify/playback_platform/timeline/v1/timespan.proto";

message Timeline {
  repeated .spotify.playback_platform.timeline.v1.Timespan spans = 1;
  repeated uint64 tags = 4;
  optional .spotify.playback_platform.timeline.v1.Timepoint duration_override = 2;
  optional string uid = 3;
  optional string format_id = 5;
}

