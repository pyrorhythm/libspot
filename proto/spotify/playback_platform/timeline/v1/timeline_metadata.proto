syntax = "proto3";

package spotify.playback_platform.timeline.v1;

option java_package = "spotify.playback_platform.timeline.v1";
option java_multiple_files = true;

import "spotify/playback_platform/external/legacy/v1/legacy_metadata.proto";
import "spotify/playback_platform/timeline/v1/metadata/artist.proto";

message TimelineMetadata {
  message UnmappedEntry {
    string key = 1;
    string value = 2;
  }

  repeated .spotify.playback_platform.timeline.v1.TimelineMetadata.UnmappedEntry unmapped = 1;
  repeated .spotify.playback_platform.timeline.v1.metadata.Artist artists = 2;
  .spotify.playback_platform.external.legacy.v1.LegacyMetadata legacy = 2352;
}

