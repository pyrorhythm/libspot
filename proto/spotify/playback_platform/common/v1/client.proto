syntax = "proto3";

package spotify.playback_platform.common.v1;

option java_package = "spotify.playback_platform.common.v1";
option java_multiple_files = true;

import "spotify/playback_platform/common/v1/device.proto";
import "spotify/playback_platform/common/v1/locale.proto";

message Client {
  .spotify.playback_platform.common.v1.Device device = 1;
  .spotify.playback_platform.common.v1.Locale locale = 2;
}

