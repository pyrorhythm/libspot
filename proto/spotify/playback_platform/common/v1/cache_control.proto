syntax = "proto3";

package spotify.playback_platform.common.v1;

option java_package = "spotify.playback_platform.common.v1";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";

message CacheControl {
  bool disallow_expired_use_on_failure = 3;
  bool disallow_expired_use_if_offline = 4;
  optional bytes entity_tag = 1;
  optional .google.protobuf.Timestamp valid_until = 2;
}

