syntax = "proto3";

package spotify.playback_platform.context.v1;

option java_package = "spotify.playback_platform.context.v1";
option java_multiple_files = true;

import "spotify/playback_platform/context/v1/behavior/disable.proto";
import "spotify/playback_platform/context/v1/behavior/events.proto";
import "spotify/playback_platform/context/v1/behavior/ledger.proto";
import "spotify/playback_platform/context/v1/behavior/navigation.proto";
import "spotify/playback_platform/context/v1/behavior/queue.proto";
import "spotify/playback_platform/context/v1/behavior/shuffle_algorithm.proto";
import "spotify/playback_platform/context/v1/behavior/shuffle_placement.proto";
import "spotify/playback_platform/context/v1/behavior/signals.proto";
import "spotify/playback_platform/context/v1/behavior/skips.proto";
import "spotify/playback_platform/context/v1/behavior/start.proto";
import "spotify/playback_platform/context/v1/behavior/timeline.proto";
import "spotify/playback_platform/context/v1/behavior/timers.proto";

message ContextBehavior {
  reserved 11 to 13;
  .spotify.playback_platform.context.v1.behavior.Events events = 1;
  .spotify.playback_platform.context.v1.behavior.Timers timers = 2;
  .spotify.playback_platform.context.v1.behavior.Signals signals = 3;
  .spotify.playback_platform.context.v1.behavior.Disable disable = 4;
  .spotify.playback_platform.context.v1.behavior.Navigation navigation = 5;
  .spotify.playback_platform.context.v1.behavior.Start start = 6;
  .spotify.playback_platform.context.v1.behavior.Skips skips = 7;
  .spotify.playback_platform.context.v1.behavior.Queue queue = 8;
  .spotify.playback_platform.context.v1.behavior.Timeline timeline = 9;
  .spotify.playback_platform.context.v1.behavior.Ledger ledger = 10;
  .spotify.playback_platform.context.v1.behavior.ShuffleAlgorithm shuffle_algorithm = 14;
  .spotify.playback_platform.context.v1.behavior.ShufflePlacement shuffle_placement = 15;
}

