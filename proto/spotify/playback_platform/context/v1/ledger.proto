syntax = "proto3";

package spotify.playback_platform.context.v1;

option java_package = "spotify.playback_platform.context.v1";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";
import "spotify/playback_platform/context/v1/ledger_entry.proto";

message Ledger {
  .google.protobuf.Timestamp create_time = 1;
  repeated .spotify.playback_platform.context.v1.LedgerEntry entries = 2;
}

