syntax = "proto3";

package spotify.playback_platform.context.v1;

option java_package = "spotify.playback_platform.context.v1";
option java_multiple_files = true;

import "spotify/playback_platform/common/v1/duration.proto";
import "spotify/playback_platform/context/v1/sequence_query.proto";

message SequenceStart {
  optional .spotify.playback_platform.context.v1.SequenceQuery child = 1;
  optional .spotify.playback_platform.common.v1.StochasticDuration position = 2;
}

