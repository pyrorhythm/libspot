syntax = "proto3";

package spotify.playback_platform.context.v1.behavior;

option java_package = "spotify.playback_platform.context.v1.behavior";
option java_multiple_files = true;

import "spotify/playback_platform/context/v1/sequence_query.proto";

message Navigation {
  message Transitions {
    .spotify.playback_platform.context.v1.SequenceQuery sources = 1;
    .spotify.playback_platform.context.v1.SequenceQuery targets = 2;
    .spotify.playback_platform.context.v1.behavior.Navigation.AllowWrap allow_wrap = 3;
    .spotify.playback_platform.context.v1.behavior.Navigation.MoveStack move_stack = 4;
  }

  enum AllowWrap {
    ALLOW_WRAP_NEVER = 0;
    ALLOW_WRAP_REPEATING_SEQUENCE = 1;
    ALLOW_WRAP_REPEATING_TIMELINE = 2;
    ALLOW_WRAP_ALWAYS = 3;
  }

  enum MoveStack {
    MOVE_STACK_UNUSED = 0;
    MOVE_STACK_REQUIRED = 1;
    MOVE_STACK_PREFERRED = 2;
  }

  repeated .spotify.playback_platform.context.v1.behavior.Navigation.Transitions move_to_prev = 1;
  repeated .spotify.playback_platform.context.v1.behavior.Navigation.Transitions move_to_next = 2;
  repeated .spotify.playback_platform.context.v1.behavior.Navigation.Transitions skip_to_prev = 3;
  repeated .spotify.playback_platform.context.v1.behavior.Navigation.Transitions skip_to_next = 4;
  repeated .spotify.playback_platform.context.v1.behavior.Navigation.Transitions fail_to_prev = 5;
  repeated .spotify.playback_platform.context.v1.behavior.Navigation.Transitions fail_to_next = 6;
}

