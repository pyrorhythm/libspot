syntax = "proto3";

package spotify.list.v1.model;

option java_package = "com.spotify.list.v1.model";
option java_outer_classname = "PaginationProto";
option java_multiple_files = true;

message Pagination {
  optional int32 length = 1;
  optional bytes continuation_token = 2;
  optional int32 offset = 3;
}

message PaginationResponse {
  optional int32 next_offset = 2;
}

