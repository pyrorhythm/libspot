syntax = "proto3";

package spotify.list.v1.model.attributes;

option java_package = "com.spotify.list.v1.model.attributes";
option java_outer_classname = "GeoblockBlockingTypeProto";
option java_multiple_files = true;

message Geoblock {
  repeated .spotify.list.v1.model.attributes.GeoblockBlockingType blocking_types = 1;
}

enum GeoblockBlockingType {
  GEOBLOCK_BLOCKING_TYPE_UNSPECIFIED = 0;
  GEOBLOCK_BLOCKING_TYPE_TITLE = 1;
  GEOBLOCK_BLOCKING_TYPE_DESCRIPTION = 2;
  GEOBLOCK_BLOCKING_TYPE_IMAGE = 3;
}

