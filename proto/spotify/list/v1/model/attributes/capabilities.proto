syntax = "proto3";

package spotify.list.v1.model.attributes;

option java_package = "com.spotify.list.v1.model.attributes";
option java_outer_classname = "CapabilitiesProto";
option java_multiple_files = true;

import "spotify/list/v1/model/attribute_kinds.proto";

message Permission {
  optional bytes revision = 1;
  optional .spotify.list.v1.model.attributes.PermissionLevel permission_level = 2;
}

message GrantableLevels {
  repeated .spotify.list.v1.model.attributes.PermissionLevel base = 1;
  repeated .spotify.list.v1.model.attributes.PermissionLevel member = 2;
}

message AdministratePermissionCapabilities {
  optional bool can_set = 1;
  optional bool can_remove = 2;
  optional bool can_remove_own = 3;
}

message AdministratePermissionKindCapabilities {
  reserved "abuse";
  reserved "profile";
  reserved "authorized";
  reserved 3;
  reserved 4;
  reserved 5;
  optional .spotify.list.v1.model.attributes.AdministratePermissionCapabilities base = 1;
  optional .spotify.list.v1.model.attributes.AdministratePermissionCapabilities member = 2;
  optional .spotify.list.v1.model.attributes.AdministratePermissionCapabilities grant = 6;
}

message AttributeCapabilities {
  optional bool can_edit = 1;
}

message AttributeKindCapabilities {
  optional .spotify.list.v1.model.AttributeKind attribute_kind = 1;
  optional .spotify.list.v1.model.attributes.AttributeCapabilities capabilities = 2;
}

message ListAttributeCapabilities {
  optional .spotify.list.v1.model.attributes.AttributeCapabilities name = 1;
  optional .spotify.list.v1.model.attributes.AttributeCapabilities description = 2;
  optional .spotify.list.v1.model.attributes.AttributeCapabilities picture = 3;
  optional .spotify.list.v1.model.attributes.AttributeCapabilities collaborative = 4;
  optional .spotify.list.v1.model.attributes.AttributeCapabilities deleted_by_owner = 6;
  optional .spotify.list.v1.model.attributes.AttributeCapabilities ai_curation_reference_id = 15;
}

message Capabilities {
  repeated .spotify.list.v1.model.attributes.PermissionLevel grantable_level = 3;
  repeated .spotify.list.v1.model.attributes.AttributeKindCapabilities attribute_kind_capabilities = 9;
  optional bool can_view = 1;
  optional bool can_administrate_permissions = 2;
  optional bool can_edit_metadata = 4;
  optional bool can_edit_items = 5;
  optional bool can_cancel_membership = 6;
  optional .spotify.list.v1.model.attributes.GrantableLevels grantable_levels = 7;
  optional .spotify.list.v1.model.attributes.ListAttributeCapabilities list_attribute_capabilities = 8;
  optional bool can_mix_playlist = 10;
  optional bool can_send_messages = 11;
  optional .spotify.list.v1.model.attributes.AdministratePermissionKindCapabilities administrate_permission_kind_capabilities = 12;
  optional bool can_delete = 13;
  optional bool can_abuse_report = 14;
}

enum PermissionLevel {
  UNKNOWN = 0;
  BLOCKED = 1;
  VIEWER = 2;
  CONTRIBUTOR = 3;
  MADE_FOR = 4;
  ADMIN = 5;
}

