syntax = "proto2";

package spotify.player.proto;

import "context_processor.proto";
import "play_origin.proto";
import "prepare_play_options.proto";
import "track_instance.proto";
import "track_instantiator.proto";
import "context_track.proto";

message ContextNode {
  optional .spotify.player.proto.TrackInstance current_track = 2;
  optional .spotify.player.proto.TrackInstantiator instantiate = 3;
  optional .spotify.player.proto.PreparePlayOptions prepare_options = 4;
  optional .spotify.player.proto.PlayOrigin play_origin = 5;
  optional .spotify.player.proto.ContextProcessor context_processor = 6;
  optional string session_id = 7;
  optional sint32 iteration = 8;
  optional bool pending_pause = 9;
  optional .spotify.player.proto.ContextTrack injected_connect_transfer_track = 10;
}

