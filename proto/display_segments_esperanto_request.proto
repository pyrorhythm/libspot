syntax = "proto3";

package spotify.display_segments_esperanto.proto.v1;

option java_package = "com.spotify.display_segments_esperanto.proto";
option java_multiple_files = true;
option objc_class_prefix = "ESP";

import "policy/album_decoration_policy.proto";
import "policy/artist_decoration_policy.proto";
import "policy/episode_decoration_policy.proto";
import "policy/track_decoration_policy.proto";
import "policy/show_decoration_policy.proto";

message SegmentsRequest {
  repeated string episode_uris = 1;
  .spotify.display_segments_esperanto.proto.v1.TrackDecorationPolicy track_decoration_policy = 2;
  .spotify.display_segments_esperanto.proto.v1.SegmentsPolicy segments_policy = 3;
  .spotify.display_segments_esperanto.proto.v1.EpisodeDecorationPolicy episode_decoration_policy = 4;
}

message TrackDecorationPolicy {
  .spotify.cosmos_util.proto.TrackDecorationPolicy track_policy = 1;
  .spotify.cosmos_util.proto.ArtistDecorationPolicy artists_policy = 2;
  .spotify.cosmos_util.proto.AlbumDecorationPolicy album_policy = 3;
  .spotify.cosmos_util.proto.ArtistDecorationPolicy album_artist_policy = 4;
}

message SegmentsPolicy {
  bool playback = 1;
  bool embedded = 2;
}

message EpisodeDecorationPolicy {
  .spotify.cosmos_util.proto.EpisodeDecorationPolicy episode_policy = 1;
  .spotify.cosmos_util.proto.ShowDecorationPolicy show_decoration_policy = 2;
}

