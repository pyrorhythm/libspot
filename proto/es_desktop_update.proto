syntax = "proto3";

package spotify.desktop.update_esperanto.proto;

import "google/protobuf/empty.proto";

service DesktopUpdate {
  rpc SubscribeStatus (.google.protobuf.Empty) returns (stream .spotify.desktop.update_esperanto.proto.SubscribeStatusResponse) {}
  rpc TriggerDownload (.spotify.desktop.update_esperanto.proto.TriggerDownloadRequest) returns (.spotify.desktop.update_esperanto.proto.TriggerDownloadResponse) {}
  rpc ApplyUpdate (.spotify.desktop.update_esperanto.proto.ApplyUpdateRequest) returns (.spotify.desktop.update_esperanto.proto.ApplyUpdateResponse) {}
}

message SubscribeStatusResponse {
  .spotify.desktop.update_esperanto.proto.UpdateState state = 1;
  optional string version = 2;
}

message TriggerDownloadRequest {
}

message TriggerDownloadResponse {
}

message ApplyUpdateRequest {
}

message ApplyUpdateResponse {
}

enum UpdateState {
  UPDATE_STATE_UNSPECIFIED = 0;
  UPDATE_STATE_NONE = 1;
  UPDATE_STATE_PENDING = 2;
  UPDATE_STATE_PROCESSING = 3;
  UPDATE_STATE_READY = 4;
}

