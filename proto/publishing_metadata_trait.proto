syntax = "proto3";

package spotify.contentagnostic.v2;

option java_package = "com.spotify.contentagnostic.v2";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";

message PublishingMetadataTrait {
  .spotify.contentagnostic.v2.TimestampOfVaryingGranularity first_published_at = 1;
  .google.protobuf.Timestamp published_on_spotify_at = 2;
  .google.protobuf.Timestamp last_modified_at = 3;
  repeated string copyright_information = 4;
}

message TimestampOfVaryingGranularity {
  oneof timestamp {
    .spotify.contentagnostic.v2.Year year = 1;
    .spotify.contentagnostic.v2.YearMonth year_and_month = 2;
    .spotify.contentagnostic.v2.YearMonthDay year_month_and_day = 3;
  }
}

message Year {
  int32 year = 1;
}

message YearMonth {
  int32 year = 1;
  int32 month = 2;
}

message YearMonthDay {
  int32 year = 1;
  int32 month = 2;
  int32 day = 3;
}

