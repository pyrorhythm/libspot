syntax = "proto3";

package spotify.player.esperanto.proto;

option java_package = "com.spotify.player.esperanto.proto";
option objc_class_prefix = "ESP";

import "es_context_player_options.proto";
import "es_optional.proto";
import "es_skip_to_track.proto";

message PreparePlayOptions {
  message ConfigurationOverrideEntry {
    string key = 1;
    string value = 2;
  }

  enum PrefetchLevel {
    NONE = 0;
    MEDIA = 1;
  }

  enum AudioStream {
    DEFAULT = 0;
    ALARM = 1;
  }

  bytes playback_id = 1;
  bool always_play_something = 2;
  .spotify.player.esperanto.proto.SkipToTrack skip_to = 3;
  .spotify.player.esperanto.proto.OptionalInt64 seek_to = 4;
  bool initially_paused = 5;
  bool system_initiated = 6;
  .spotify.player.esperanto.proto.ContextPlayerOptionOverrides player_options_override = 7;
  repeated string suppressions = 8;
  .spotify.player.esperanto.proto.PreparePlayOptions.PrefetchLevel prefetch_level = 9;
  .spotify.player.esperanto.proto.PreparePlayOptions.AudioStream audio_stream = 10;
  string session_id = 11;
  string license = 12;
  repeated .spotify.player.esperanto.proto.PreparePlayOptions.ConfigurationOverrideEntry configuration_override = 13;
  optional string seek_to_creator_timestamp = 14;
}

