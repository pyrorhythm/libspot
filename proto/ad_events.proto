syntax = "proto3";

package spotify.ads.esperanto.proto;

option java_package = "com.spotify.ads.esperanto.proto";
option java_multiple_files = true;
option objc_class_prefix = "ESP";

import "ad_common.proto";

service Events {
  rpc postEvent (.spotify.ads.esperanto.proto.EventRequest) returns (.spotify.ads.esperanto.proto.EventResponse) {}
  rpc postUnmanagedEvent (.spotify.ads.esperanto.proto.UnmanagedEventRequest) returns (.spotify.ads.esperanto.proto.UnmanagedEventResponse) {}
  rpc subEvent (.spotify.ads.esperanto.proto.SubEventRequest) returns (stream .spotify.ads.esperanto.proto.SubEventResponse) {}
}

message EventRequest {
  string ad_id = 1;
  string event_type = 2;
  optional uint64 playback_position = 3;
  optional string event_reason = 4;
  optional string event_source = 5;
  optional string slot_id = 6;
  optional string client_payload = 7;
  optional uint64 playback_duration = 8;
}

message EventResponse {
  enum Status {
    ACCEPTED = 0;
    AD_NOT_FOUND = 1;
  }

  .spotify.ads.esperanto.proto.EventResponse.Status status = 1;
}

message UnmanagedEventRequest {
  string ad_id = 1;
  string event_type = 2;
  string lineitem_id = 5;
  string creative_id = 6;
  string request_id = 7;
  string product_name = 8;
  string slot_id = 9;
  repeated string tracking_urls = 12;
  optional uint64 playback_position = 3;
  optional string event_reason = 4;
  optional string event_source = 10;
  optional .spotify.ads.esperanto.proto.AdFormat format = 11;
  optional uint32 duration_seconds = 13;
}

message UnmanagedEventResponse {
}

message SubEventRequest {
  string event_type = 1;
  optional .spotify.ads.esperanto.proto.AdFormat format = 2;
  optional string slot_id = 3;
}

message AdEvent {
  string event_type = 1;
  string slot_id = 2;
  .spotify.ads.esperanto.proto.Ad ad = 3;
}

message SubEventResponse {
  enum Status {
    OK = 0;
    INVALID_SLOT = 1;
    INVALID_FORMAT = 2;
  }

  .spotify.ads.esperanto.proto.SubEventResponse.Status status = 1;
  .spotify.ads.esperanto.proto.AdEvent adEvent = 2;
}

