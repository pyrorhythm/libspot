syntax = "proto2";

package spotify.show_cosmos.unfinished_episodes_request.proto;

option objc_class_prefix = "SPTShowCosmosUnfinshedEpisodes";

import "metadata/episode_metadata.proto";
import "played_state/episode_played_state.proto";
import "show_episode_state.proto";

message Episode {
  optional .spotify.cosmos_util.proto.EpisodeMetadata episode_metadata = 1;
  optional .spotify.show_cosmos.proto.EpisodeCollectionState episode_collection_state = 2;
  optional .spotify.show_cosmos.proto.EpisodeOfflineState episode_offline_state = 3;
  optional .spotify.cosmos_util.proto.EpisodePlayState episode_play_state = 4;
  optional string link = 5;
}

message Response {
  reserved 1;
  repeated .spotify.show_cosmos.unfinished_episodes_request.proto.Episode episode = 2;
}

