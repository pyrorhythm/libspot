syntax = "proto3";

package spotify.playlist_esperanto.proto;

option java_package = "spotify.playlist.esperanto.proto";
option java_multiple_files = true;
option objc_class_prefix = "ESP";

import "google/protobuf/duration.proto";
import "policy/playlist_request_decoration_policy.proto";
import "playlist_query.proto";
import "playlist_request.proto";
import "response_status.proto";

message PlaylistGetRequest {
  string uri = 1;
  .spotify.playlist_esperanto.proto.PlaylistQuery query = 2;
  .spotify.playlist.cosmos.proto.PlaylistRequestDecorationPolicy policy = 3;
}

message PlaylistMultiGetSingleRequest {
  string id = 1;
  .spotify.playlist_esperanto.proto.PlaylistGetRequest request = 2;
}

message PlaylistMultiGetRequest {
  repeated .spotify.playlist_esperanto.proto.PlaylistMultiGetSingleRequest requests = 1;
  .google.protobuf.Duration timeout = 2;
}

message PlaylistGetResponse {
  .spotify.playlist_esperanto.proto.ResponseStatus status = 1;
  .spotify.playlist.cosmos.playlist_request.proto.Response data = 2;
  .spotify.playlist_esperanto.proto.PlaylistQuery query = 3;
}

message PlaylistMultiGetSingleResponse {
  string id = 1;
  string uri = 2;
  .spotify.playlist_esperanto.proto.PlaylistGetResponse response = 3;
}

message PlaylistMultiGetResponse {
  .spotify.playlist_esperanto.proto.ResponseStatus status = 1;
  repeated .spotify.playlist_esperanto.proto.PlaylistMultiGetSingleResponse responses = 2;
}

