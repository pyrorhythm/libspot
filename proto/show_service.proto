syntax = "proto3";

package spotify.show_esperanto.proto;

option java_package = "com.spotify.show_esperanto.proto";
option java_multiple_files = true;
option objc_class_prefix = "ESP";

import "show_request.proto";
import "decorate_request.proto";
import "unfinished_episodes_request.proto";
import "policy/show_decoration_policy.proto";
import "policy/episode_decoration_policy.proto";
import "es_command_options.proto";
import "es_play_options.proto";
import "es_logging_params.proto";
import "es_prepare_play_options.proto";
import "es_play_origin.proto";

service ShowService {
  rpc GetShow (.spotify.show_esperanto.proto.GetShowRequest) returns (.spotify.show_esperanto.proto.GetShowResponse) {}
  rpc SubShow (.spotify.show_esperanto.proto.GetShowRequest) returns (stream .spotify.show_esperanto.proto.GetShowResponse) {}
  rpc GetShowEpisode (.spotify.show_esperanto.proto.GetShowRequest) returns (.spotify.show_esperanto.proto.GetShowResponse) {}
  rpc SubShowEpisode (.spotify.show_esperanto.proto.GetShowRequest) returns (stream .spotify.show_esperanto.proto.GetShowResponse) {}
  rpc GetDecorate (.spotify.show_esperanto.proto.GetDecorateRequest) returns (.spotify.show_esperanto.proto.GetDecorateResponse) {}
  rpc SubDecorate (.spotify.show_esperanto.proto.GetDecorateRequest) returns (stream .spotify.show_esperanto.proto.GetDecorateResponse) {}
  rpc GetUnfinishedEpisodes (.spotify.show_esperanto.proto.GetUnfinishedEpisodesRequest) returns (.spotify.show_esperanto.proto.GetUnfinishedEpisodesResponse) {}
  rpc SubUnfinishedEpisodes (.spotify.show_esperanto.proto.GetUnfinishedEpisodesRequest) returns (stream .spotify.show_esperanto.proto.GetUnfinishedEpisodesResponse) {}
  rpc PlayShow (.spotify.show_esperanto.proto.PlayShowRequest) returns (.spotify.show_esperanto.proto.PlayShowResponse) {}
  rpc MarkShowAsPlayed (.spotify.show_esperanto.proto.MarkShowAsPlayedRequest) returns (.spotify.show_esperanto.proto.MarkShowAsPlayedResponse) {}
}

message Status {
  enum Code {
    SUCCESS = 0;
    BAD_REQUEST = 1;
    INTERNAL_ERROR = 2;
    NOT_FOUND = 3;
  }

  .spotify.show_esperanto.proto.Status.Code code = 1;
  string reason = 2;
}

message HeaderPolicy {
  .spotify.cosmos_util.proto.ShowDecorationPolicy show_policy = 1;
  .spotify.cosmos_util.proto.ShowPlayedStateDecorationPolicy show_played_state_policy = 2;
  .spotify.cosmos_util.proto.ShowCollectionDecorationPolicy show_collection_policy = 3;
  optional .spotify.cosmos_util.proto.ShowOfflineStateDecorationPolicy show_offline_state_policy = 4;
}

message ListPolicy {
  .spotify.cosmos_util.proto.EpisodeDecorationPolicy episode_policy = 1;
  .spotify.cosmos_util.proto.EpisodeCollectionDecorationPolicy episode_collection_policy = 2;
  .spotify.cosmos_util.proto.EpisodeSyncDecorationPolicy episode_sync_policy = 3;
  .spotify.cosmos_util.proto.EpisodePlayedStateDecorationPolicy episode_played_state_policy = 4;
  bool progress = 5;
  optional .spotify.show_esperanto.proto.HeaderPolicy show_policy = 6;
}

message SectionsPolicy {
  bool continue_listening = 1;
  bool trailer_section = 2;
  bool latest_unplayed_episode = 3;
  bool next_best_episode = 4;
  bool saved_episodes = 5;
}

message QueryFilter {
  enum Availability {
    AVAILABILITY_NONE = 0;
    AVAILABILITY_AVAILABLE = 1;
  }

  enum OfflineStatus {
    OFFLINE_STATUS_NONE = 0;
    OFFLINE_STATUS_AVAILABLE_OFFLINE = 1;
  }

  enum PlayedState {
    PLAYED_STATE_NONE = 0;
    PLAYED_STATE_UNPLAYED = 1;
    PLAYED_STATE_IN_PROGRESS = 2;
  }

  enum CollectionStatus {
    COLLECTION_STATUS_NONE = 0;
    COLLECTION_STATUS_IN_YOUR_EPISODES = 1;
  }

  enum SubscriptionStatus {
    SUBSCRIPTION_STATUS_NONE = 0;
    SUBSCRIPTION_STATUS_PAYWALLED = 1;
    SUBSCRIPTION_STATUS_AVAILABLE = 2;
  }

  .spotify.show_esperanto.proto.QueryFilter.Availability availability = 1;
  .spotify.show_esperanto.proto.QueryFilter.OfflineStatus offline_status = 2;
  .spotify.show_esperanto.proto.QueryFilter.PlayedState played_state = 3;
  .spotify.show_esperanto.proto.QueryFilter.CollectionStatus collection_status = 5;
  .spotify.show_esperanto.proto.QueryFilter.SubscriptionStatus subscription_status = 6;
  optional string contains_text = 4;
}

message GetShowRequest {
  message Range {
    message Focus {
      enum Type {
        LATEST_PLAYED = 0;
        CONTINUE_LISTENING = 1;
        URI = 2;
      }

      .spotify.show_esperanto.proto.GetShowRequest.Range.Focus.Type type = 1;
      string data = 2;
    }

    uint32 limit = 3;
    oneof selection {
      uint32 start = 1;
      .spotify.show_esperanto.proto.GetShowRequest.Range.Focus focus = 2;
    }
  }

  string show_id = 1;
  uint32 update_throttling = 2;
  int32 range_start = 3;
  string sort = 5;
  string filter = 6;
  string include_in_range = 7;
  .spotify.show_esperanto.proto.SectionsPolicy sections_policy = 11;
  .spotify.show_esperanto.proto.SortOrder sort_order = 12;
  .spotify.show_esperanto.proto.GetShowRequest.Range range = 13;
  .spotify.show_esperanto.proto.QueryFilter query_filter = 14;
  bool include_extensions_on_error = 15;
  bool prefer_cache = 16;
  optional int32 range_length = 4;
  optional int32 force_include_context = 8;
  optional .spotify.show_esperanto.proto.HeaderPolicy header_policy = 9;
  optional .spotify.show_esperanto.proto.ListPolicy list_policy = 10;
}

message GetShowResponse {
  .spotify.show_cosmos.proto.Response response = 1;
  .spotify.show_esperanto.proto.Status status = 2;
}

message GetDecorateRequest {
  repeated string item = 1;
  bool prefer_cached = 2;
  uint32 update_throttling = 3;
  optional .spotify.show_esperanto.proto.HeaderPolicy show_policy = 4;
  optional .spotify.show_esperanto.proto.ListPolicy episode_policy = 5;
}

message GetDecorateResponse {
  .spotify.show_cosmos.decorate_request.proto.Response response = 1;
  .spotify.show_esperanto.proto.Status status = 2;
}

message GetUnfinishedEpisodesRequest {
  int32 range_start = 1;
  string sort = 3;
  string filter = 4;
  uint32 update_throttling = 5;
  uint32 abs_time_left_tolerance = 6;
  double rel_time_left_tolerance = 7;
  bool prefer_cached = 8;
  optional int32 range_length = 2;
  optional .spotify.show_esperanto.proto.ListPolicy policy = 9;
}

message GetUnfinishedEpisodesResponse {
  .spotify.show_cosmos.unfinished_episodes_request.proto.Response response = 1;
  .spotify.show_esperanto.proto.Status status = 2;
}

message PlayShowRequest {
  enum Intention {
    INTENTION_NONE = 0;
    INTENTION_LAST_PLAYED = 1;
  }

  string release_group_uri = 1;
  .spotify.show_esperanto.proto.SortOrder sort_order = 2;
  .spotify.show_esperanto.proto.QueryFilter query_filter = 3;
  .spotify.show_esperanto.proto.PlayShowRequest.Intention intention = 4;
  .spotify.player.esperanto.proto.PreparePlayOptions options = 5;
  .spotify.player.esperanto.proto.PlayOrigin play_origin = 6;
  .spotify.player.esperanto.proto.PlayOptions play_options = 7;
  .spotify.player.esperanto.proto.CommandOptions command_options = 8;
  .spotify.player.esperanto.proto.LoggingParams logging_params = 9;
}

message PlayShowResponse {
  .spotify.show_esperanto.proto.Status status = 1;
}

message MarkShowAsPlayedRequest {
  enum State {
    PLAYED = 0;
    UNPLAYED = 1;
  }

  string show_id = 1;
  .spotify.show_esperanto.proto.MarkShowAsPlayedRequest.State state = 2;
}

message MarkShowAsPlayedResponse {
  .spotify.show_esperanto.proto.Status status = 1;
}

enum SortOrder {
  NONE = 0;
  CONSUMPTION_ORDER_ASC = 1;
  PUBLISH_DATE_ASC = 2;
  PUBLISH_DATE_DESC = 3;
  POPULARITY_DESC = 4;
}

