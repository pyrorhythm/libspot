syntax = "proto3";

package spotify.resumption.v1;

option java_package = "com.spotify.resumption.v1";
option java_outer_classname = "ResumePointProto";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/any.proto";

message RelativePosition {
  .google.protobuf.Duration start_offset = 1;
  .google.protobuf.Duration content_duration = 2;
}

message ResumePoint {
  string resume_point_id = 1;
  oneof resume_point {
    .google.protobuf.Duration position = 2;
    .google.protobuf.Empty started = 3;
    .google.protobuf.Empty finished = 4;
    int32 counter = 5;
    string uri = 6;
    .google.protobuf.Any custom = 7;
    .google.protobuf.Empty marked_as_finished = 8;
    .google.protobuf.Empty unmarked_as_finished = 9;
    .spotify.resumption.v1.RelativePosition relative_position = 10;
    .google.protobuf.Empty tombstone = 11;
  }
}

message ResumePointRevision {
  string resume_point_revision_id = 1;
  .spotify.resumption.v1.ResumePoint snapshot = 2;
  .google.protobuf.Timestamp create_time = 3;
  .google.protobuf.Timestamp update_time = 4;
}

message ListResumePointRevisionsRequest {
  string user_id = 1;
  string uri = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message ListResumePointRevisionsResponse {
  repeated .spotify.resumption.v1.ResumePointRevision resume_point_revisions = 1;
  string next_page_token = 2;
}

message CreateResumePointRevisionRequest {
  string user_id = 1;
  string uri = 2;
  .spotify.resumption.v1.ResumePointRevision resume_point_revision = 4;
}

message CreateResumePointRevisionResponse {
  .spotify.resumption.v1.ResumePointRevision resume_point_revision = 1;
}

message BatchCreateResumePointRevisionsRequest {
  string user_id = 1;
  repeated .spotify.resumption.v1.CreateResumePointRevisionRequest requests = 2;
}

message BatchCreateResumePointRevisionsResponse {
  message ResumePointRevisionsEntry {
    string key = 1;
    .spotify.resumption.v1.ResumePointRevisionList value = 2;
  }

  repeated .spotify.resumption.v1.BatchCreateResumePointRevisionsResponse.ResumePointRevisionsEntry resume_point_revisions = 1;
}

message ResumePointRevisionList {
  repeated .spotify.resumption.v1.ResumePointRevision resume_point_revisions = 1;
}

message CurrentState {
  string uri = 1;
  repeated .spotify.resumption.v1.ResumePointRevision resume_point_revisions = 2;
}

message ListCurrentStatesRequest {
  string user_id = 1;
  int32 page_size = 2;
  string page_token = 3;
  string filter = 4;
}

message ListCurrentStatesResponse {
  repeated .spotify.resumption.v1.CurrentState current_states = 1;
  string next_page_token = 2;
}

