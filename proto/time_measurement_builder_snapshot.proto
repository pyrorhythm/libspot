syntax = "proto3";

package spotify.timekeeper_proto;

option java_package = "com.spotify.performancesdk.timekeeper.proto";
option java_multiple_files = true;

message TimeMeasurementBuilderSnapshot {
  message DimensionsEntry {
    string key = 1;
    string value = 2;
  }

  message MetadataEntry {
    string key = 1;
    string value = 2;
  }

  string category = 1;
  repeated .spotify.timekeeper_proto.TimeMeasurementBuilderSnapshotCapturedPointStart captured_point_starts = 2;
  repeated .spotify.timekeeper_proto.TimeMeasurementBuilderSnapshotCapturedPointEnd captured_point_ends = 3;
  repeated .spotify.timekeeper_proto.TimeMeasurementBuilderSnapshotCapturedPoint captured_points = 4;
  repeated .spotify.timekeeper_proto.TimeMeasurementBuilderSnapshot.DimensionsEntry dimensions = 6;
  repeated .spotify.timekeeper_proto.TimeMeasurementBuilderSnapshot.MetadataEntry metadata = 7;
  optional uint64 epoch_timestamp = 5;
}

message TimeMeasurementBuilderSnapshotCapturedPointStart {
  string identifier = 1;
  int64 timestamp = 3;
  bool is_required = 4;
  optional string feature_id = 2;
}

message TimeMeasurementBuilderSnapshotCapturedPointEnd {
  string identifier = 1;
  int64 timestamp = 2;
}

message TimeMeasurementBuilderSnapshotCapturedPoint {
  string identifier = 1;
  int64 timestamp = 3;
  uint64 duration = 4;
  optional string feature_id = 2;
}

