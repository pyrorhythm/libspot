syntax = "proto3";

package spotify.pending_events.esperanto.proto;

option java_package = "com.spotify.pending_events.esperanto.proto";
option java_multiple_files = true;
option objc_class_prefix = "ESP";

message ReplacePendingEventRequest {
  string token_event_name = 1;
  uint32 token_sequence_no = 2;
  string proto_name = 3;
  bytes proto_data = 4;
}

