syntax = "proto3";

package spotify.pending_events.esperanto.proto;

option java_package = "com.spotify.pending_events.esperanto.proto";
option java_multiple_files = true;
option objc_class_prefix = "ESP";

import "es_pending_events_error.proto";

message CommitPendingEventResponse {
  bool success = 1;
  .spotify.pending_events.esperanto.proto.PendingEventsError error = 2;
}

