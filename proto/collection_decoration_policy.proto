syntax = "proto3";

package spotify.collection_cosmos.proto;

option java_package = "spotify.collection.esperanto.proto";
option java_multiple_files = true;
option objc_class_prefix = "ESP";

import "policy/artist_decoration_policy.proto";
import "policy/album_decoration_policy.proto";
import "policy/track_decoration_policy.proto";
import "policy/show_decoration_policy.proto";
import "policy/episode_decoration_policy.proto";

message CollectionArtistDecorationPolicy {
  .spotify.cosmos_util.proto.ArtistCollectionDecorationPolicy collection_policy = 1;
  .spotify.cosmos_util.proto.ArtistSyncDecorationPolicy sync_policy = 2;
  .spotify.cosmos_util.proto.ArtistDecorationPolicy artist_policy = 3;
  bool decorated = 4;
}

message CollectionAlbumDecorationPolicy {
  bool decorated = 1;
  bool album_type = 2;
  .spotify.collection_cosmos.proto.CollectionArtistDecorationPolicy artist_policy = 3;
  .spotify.collection_cosmos.proto.CollectionArtistDecorationPolicy artists_policy = 4;
  .spotify.cosmos_util.proto.AlbumCollectionDecorationPolicy collection_policy = 5;
  .spotify.cosmos_util.proto.AlbumSyncDecorationPolicy sync_policy = 6;
  .spotify.cosmos_util.proto.AlbumDecorationPolicy album_policy = 7;
}

message CollectionTrackDecorationPolicy {
  .spotify.cosmos_util.proto.TrackCollectionDecorationPolicy collection_policy = 1;
  .spotify.cosmos_util.proto.TrackSyncDecorationPolicy sync_policy = 2;
  .spotify.cosmos_util.proto.TrackDecorationPolicy track_policy = 3;
  .spotify.cosmos_util.proto.TrackPlayedStateDecorationPolicy played_state_policy = 4;
  .spotify.collection_cosmos.proto.CollectionAlbumDecorationPolicy album_policy = 5;
  .spotify.cosmos_util.proto.ArtistDecorationPolicy artist_policy = 6;
  bool decorated = 7;
  .spotify.cosmos_util.proto.ArtistCollectionDecorationPolicy artist_collection_policy = 8;
}

message CollectionShowDecorationPolicy {
  .spotify.cosmos_util.proto.ShowDecorationPolicy show_policy = 1;
  .spotify.cosmos_util.proto.ShowPlayedStateDecorationPolicy played_state_policy = 2;
  .spotify.cosmos_util.proto.ShowCollectionDecorationPolicy collection_policy = 3;
  bool decorated = 4;
}

message CollectionEpisodeDecorationPolicy {
  .spotify.cosmos_util.proto.EpisodeDecorationPolicy episode_policy = 1;
  .spotify.cosmos_util.proto.EpisodeCollectionDecorationPolicy collection_policy = 2;
  .spotify.cosmos_util.proto.EpisodeSyncDecorationPolicy sync_policy = 3;
  .spotify.cosmos_util.proto.EpisodePlayedStateDecorationPolicy played_state_policy = 4;
  .spotify.collection_cosmos.proto.CollectionShowDecorationPolicy show_policy = 5;
  bool decorated = 6;
}

