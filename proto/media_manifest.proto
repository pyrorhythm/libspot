syntax = "proto3";

package spotify.media_manifest.proto;

message AudioFile {
  enum Format {
    OGG_VORBIS_96 = 0;
    OGG_VORBIS_160 = 1;
    OGG_VORBIS_320 = 2;
    MP3_256 = 3;
    MP3_320 = 4;
    MP3_160 = 5;
    MP3_96 = 6;
    MP3_160_ENC = 7;
    AAC_24 = 8;
    AAC_48 = 9;
    FLAC_FLAC = 16;
  }

}

message File {
  message ExternalFile {
    string method = 1;
    bytes body = 4;
    oneof endpoint {
      string url = 2;
      string service = 3;
    }
    optional bool disable_range_requests = 5;
  }

  message FileIdFile {
    string file_id_hex = 1;
    .spotify.media_manifest.proto.AudioFile.Format download_format = 2;
    .spotify.media_manifest.proto.EncryptionType encryption = 3;
  }

  message NormalizationParams {
    float loudness_db = 1;
    float true_peak_db = 2;
  }

  int32 bitrate = 3;
  string mime_type = 4;
  oneof file {
    .spotify.media_manifest.proto.File.ExternalFile external_file = 1;
    .spotify.media_manifest.proto.File.FileIdFile file_id_file = 2;
  }
  optional .spotify.media_manifest.proto.File.NormalizationParams normalization_params = 5;
}

message Files {
  repeated .spotify.media_manifest.proto.File files = 1;
}

enum EncryptionType {
  NONE = 0;
  AES = 1;
}

