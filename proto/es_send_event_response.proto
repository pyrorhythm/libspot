syntax = "proto3";

package spotify.event_sender.esperanto.proto;

option java_package = "com.spotify.eventsender.esperanto.proto";
option objc_class_prefix = "ESP";

message SendEventResponse {
  bool success = 1;
  .spotify.event_sender.esperanto.proto.SendResult send_result = 2;
  .spotify.event_sender.esperanto.proto.PersistenceResult persistence_result = 3;
}

enum SendResult {
  ACCEPTED = 0;
  PROTOBUF_SERIALIZATION_FAILED = 1;
  EVENT_REJECTED_MISSING_NAME = 2;
  EVENT_REJECTED_MISSING_OWNER = 3;
  EVENT_REJECTED_EVENT_DATA_TOO_LARGE = 4;
  EVENT_REJECTED_RATE_LIMITED = 5;
  OTHER_ERROR = 6;
}

enum PersistenceResult {
  SUCCESS = 0;
  FAILED_DISK_FULL = 1;
  FAILED_CORRUPTION = 2;
  FAILED_PERMISSION_ERROR = 3;
  FAILED_OTHER_ERROR = 4;
}

