syntax = "proto3";

package spotify.event_sender.proto;

message EventCounters {
  message EventNameToCountersMapEntry {
    string key = 1;
    .spotify.event_sender.proto.EventCounters.Counters value = 2;
  }

  message Counters {
    repeated int32 counters = 1;
  }

  int32 file_format_version = 1;
  repeated .spotify.event_sender.proto.EventCounters.EventNameToCountersMapEntry event_name_to_counters_map = 2;
}

