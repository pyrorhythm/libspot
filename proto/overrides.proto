syntax = "proto3";

package spotify.desktop.desktop_remote_config.proto;

import "google/protobuf/timestamp.proto";

message Overrides {
  message Property {
    message BoolValue {
      bool value = 1;
    }

    message IntValue {
      int32 value = 1;
    }

    message EnumValue {
      string value = 1;
    }

    string component_id = 5;
    string name = 6;
    .google.protobuf.Timestamp expiry = 4;
    oneof structured_value {
      .spotify.desktop.desktop_remote_config.proto.Overrides.Property.BoolValue bool_value = 1;
      .spotify.desktop.desktop_remote_config.proto.Overrides.Property.IntValue int_value = 2;
      .spotify.desktop.desktop_remote_config.proto.Overrides.Property.EnumValue enum_value = 3;
    }
  }

  repeated .spotify.desktop.desktop_remote_config.proto.Overrides.Property properties = 1;
}

