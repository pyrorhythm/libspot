  VIDEO_SURFACE_NOW_PLAYING_VIEW = 4;
  VIDEO_SURFACE_NOW_PLAYING_VIEW_VERTICAL = 5;
  VIDEO_SURFACE_PICTURE_IN_PICTURE = 6;
  VIDEO_SURFACE_CINEMA = 7;
  VIDEO_SURFACE_EXTERNAL = 8;
  VIDEO_SURFACE_OTHER = 9;
