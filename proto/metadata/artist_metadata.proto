syntax = "proto2";

package spotify.cosmos_util.proto;

option java_package = "com.spotify.cosmos.util.proto";
option java_multiple_files = true;

import "metadata/image_group.proto";

message ArtistMetadata {
  optional string link = 1;
  optional string name = 2;
  optional bool is_various_artists = 3;
  optional .spotify.cosmos_util.proto.ImageGroup portraits = 4;
}

