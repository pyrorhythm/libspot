syntax = "proto3";

package spotify.event_sender.proto;

message EventEnvelope {
  reserved 1;
  message EventFragment {
    string name = 1;
    bytes data = 2;
  }

  string event_name = 2;
  repeated .spotify.event_sender.proto.EventEnvelope.EventFragment event_fragment = 3;
  bytes sequence_id = 4;
  int64 sequence_number = 5;
}

message PublishEventsRequest {
  repeated .spotify.event_sender.proto.EventEnvelope event = 1;
  bool suppress_persist = 2;
}

message PublishEventsResponse {
  message EventError {
    int32 index = 1;
    bool transient = 2;
    int32 reason = 3;
  }

  repeated .spotify.event_sender.proto.PublishEventsResponse.EventError error = 1;
}

