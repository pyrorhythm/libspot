syntax = "proto3";

package spotify.local_files_esperanto.proto;

option java_package = "com.spotify.local_files_esperanto.proto";
option objc_class_prefix = "ESP";

import "google/protobuf/empty.proto";
import "policy/playlist_track_decoration_policy.proto";
import "playlist_track_state.proto";
import "metadata/track_metadata.proto";

service LocalFiles {
  rpc GetTracks (.spotify.local_files_esperanto.proto.GetTracksRequest) returns (.spotify.local_files_esperanto.proto.GetTracksResponse) {}
  rpc SubscribeTracks (.spotify.local_files_esperanto.proto.GetTracksRequest) returns (stream .spotify.local_files_esperanto.proto.GetTracksResponse) {}
  rpc GetScannerStatus (.google.protobuf.Empty) returns (.spotify.local_files_esperanto.proto.GetScannerStatusResponse) {}
  rpc SubscribeScannerStatus (.google.protobuf.Empty) returns (stream .spotify.local_files_esperanto.proto.GetScannerStatusResponse) {}
  rpc GetSources (.google.protobuf.Empty) returns (.spotify.local_files_esperanto.proto.GetSourcesResponse) {}
  rpc SubscribeSources (.google.protobuf.Empty) returns (stream .spotify.local_files_esperanto.proto.GetSourcesResponse) {}
  rpc MutateDefaultSource (.spotify.local_files_esperanto.proto.DefaultSource) returns (.spotify.local_files_esperanto.proto.MutateSourceResponse) {}
  rpc MutateDefaultSources (.spotify.local_files_esperanto.proto.MutateDefaultSourcesRequest) returns (.spotify.local_files_esperanto.proto.MutateSourcesResponse) {}
  rpc AddFolder (.spotify.local_files_esperanto.proto.Folder) returns (.spotify.local_files_esperanto.proto.MutateSourceResponse) {}
  rpc RemoveFolder (.spotify.local_files_esperanto.proto.Folder) returns (.spotify.local_files_esperanto.proto.MutateSourceResponse) {}
  rpc NotifyDefaultSources (.google.protobuf.Empty) returns (.google.protobuf.Empty) {}
}

message Item {
  optional uint32 add_time = 1;
  optional .spotify.cosmos_util.proto.TrackMetadata metadata = 2;
  optional .spotify.playlist.cosmos.proto.TrackCollectionState collection_state = 3;
  optional string row_id = 4;
  optional string content_uri = 5;
}

message Response {
  repeated .spotify.local_files_esperanto.proto.Item item = 1;
  optional uint32 unfiltered_length = 2;
}

message ResponseStatus {
  int32 status_code = 1;
  string reason = 2;
}

message Range {
  int32 start = 1;
  int32 length = 2;
}

message Query {
  enum SortBy {
    NO_SORT = 0;
    ALBUM_ARTIST_NAME_ASC = 1;
    ALBUM_ARTIST_NAME_DESC = 2;
    TRACK_NUMBER_ASC = 3;
    TRACK_NUMBER_DESC = 4;
    DISC_NUMBER_ASC = 5;
    DISC_NUMBER_DESC = 6;
    ALBUM_NAME_ASC = 7;
    ALBUM_NAME_DESC = 8;
    ARTIST_NAME_ASC = 9;
    ARTIST_NAME_DESC = 10;
    NAME_ASC = 11;
    NAME_DESC = 12;
    ADD_TIME_ASC = 13;
    ADD_TIME_DESC = 14;
    LENGTH_ASC = 15;
    LENGTH_DESC = 16;
  }

  string text_filter = 1;
  .spotify.local_files_esperanto.proto.Query.SortBy sort_by = 2;
  .spotify.local_files_esperanto.proto.Range range = 3;
  uint32 min_length = 4;
  bool remove_duplicate_links = 5;
}

message GetTracksRequest {
  .spotify.local_files_esperanto.proto.Query query = 1;
  .spotify.playlist.cosmos.proto.PlaylistTrackDecorationPolicy policy = 2;
}

message GetTracksResponse {
  .spotify.local_files_esperanto.proto.ResponseStatus status = 1;
  .spotify.local_files_esperanto.proto.Response data = 2;
}

message GetScannerStatusResponse {
  enum ScannerStatus {
    UNKNOWN = 0;
    IDLE = 1;
    IN_PROGRESS = 2;
  }

  .spotify.local_files_esperanto.proto.GetScannerStatusResponse.ScannerStatus scanner_status = 1;
}

message DefaultSource {
  enum Id {
    UNKNOWN = 0;
    ITUNES = 1;
    DOWNLOADS = 2;
    MY_MUSIC = 3;
    WINDOWS_MUSIC_LIBRARY = 4;
    ANDROID_MEDIA_STORE = 5;
    IOS_DOCUMENTS = 6;
  }

  .spotify.local_files_esperanto.proto.DefaultSource.Id id = 1;
  bool enabled = 2;
}

message Folder {
  string path = 1;
}

message GetSourcesResponse {
  repeated .spotify.local_files_esperanto.proto.DefaultSource default_sources = 1;
  repeated .spotify.local_files_esperanto.proto.Folder folders = 2;
}

message MutateSourceResponse {
  enum Result {
    UNKNOWN = 0;
    SUCCESS = 1;
    NOT_FOUND = 2;
    NOT_CHANGED = 3;
  }

  .spotify.local_files_esperanto.proto.MutateSourceResponse.Result result = 1;
}

message MutateDefaultSourcesRequest {
  repeated .spotify.local_files_esperanto.proto.DefaultSource sources = 1;
}

message MutateSourcesResponse {
  repeated .spotify.local_files_esperanto.proto.MutateSourceResponse sources = 1;
}

