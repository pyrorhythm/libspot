syntax = "proto3";

package spotify.podcast_segments.playback;

option java_package = "com.spotify.podcastsegments.playback.proto";
option java_outer_classname = "PlaybackSegmentsProto";
option java_multiple_files = true;
option objc_class_prefix = "SPT";

import "podcast_segments.proto";

message PlaybackSegments {
  repeated .spotify.podcast_segments.PlaybackSegment playback_segments = 1;
}

