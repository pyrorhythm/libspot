syntax = "proto2";

package spotify.playlist.cosmos.proto;

option java_package = "com.spotify.playlist.proto";
option java_multiple_files = true;
option objc_class_prefix = "SPTPlaylist";

message TrackCollectionState {
  optional bool is_in_collection = 1;
  optional bool can_add_to_collection = 2;
  optional bool is_banned = 3;
  optional bool can_ban = 4;
}

message TrackOfflineState {
  optional string offline = 1;
}

