syntax = "proto2";

package spotify.player.proto;

import "context.proto";
import "context_view.proto";
import "skip_to_track.proto";

message ContextProcessor {
  optional .spotify.player.proto.Context context = 1;
  optional .spotify.player.context_view.proto.ContextView context_view = 2;
  optional .spotify.player.proto.SkipToTrack pending_skip_to = 3;
  optional string shuffle_seed = 4;
  optional int32 index = 5;
}

