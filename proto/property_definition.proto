syntax = "proto3";

package spotify.remote_config.ucs.proto;

message PropertyDefinition {
  reserved "hash";
  reserved 2;
  message Metadata {
    string component_id = 1;
    string description = 2;
  }

  message Identifier {
    string scope = 1;
    string name = 2;
  }

  message BoolSpec {
    bool default = 1;
  }

  message IntSpec {
    int32 default = 1;
    int32 lower = 2;
    int32 upper = 3;
  }

  message EnumSpec {
    string default = 1;
    repeated string values = 2;
  }

  .spotify.remote_config.ucs.proto.PropertyDefinition.Identifier id = 1;
  .spotify.remote_config.ucs.proto.PropertyDefinition.Metadata metadata = 4;
  oneof specification {
    .spotify.remote_config.ucs.proto.PropertyDefinition.BoolSpec bool_spec = 5;
    .spotify.remote_config.ucs.proto.PropertyDefinition.IntSpec int_spec = 6;
    .spotify.remote_config.ucs.proto.PropertyDefinition.EnumSpec enum_spec = 7;
  }
}

