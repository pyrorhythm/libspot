syntax = "proto3";

package spotify.display_segments_esperanto.proto.v1;

option java_package = "com.spotify.display_segments_esperanto.proto";
option java_multiple_files = true;
option objc_class_prefix = "ESP";

import "metadata/episode_metadata.proto";
import "podcast_segments.proto";
import "metadata/track_metadata.proto";

message SegmentsResponse {
  bool success = 1;
  repeated .spotify.display_segments_esperanto.proto.v1.EpisodeSegments episode_segments = 2;
}

message EpisodeSegments {
  string episode_uri = 1;
  repeated .spotify.display_segments_esperanto.proto.v1.DecoratedSegment segments = 2;
  bool can_upsell = 3;
  string album_mosaic_uri = 4;
  repeated string artists = 5;
  int32 duration_ms = 6;
  repeated string tags = 7;
}

message DecoratedSegment {
  string uri = 1;
  int32 start_ms = 2;
  int32 stop_ms = 3;
  .spotify.cosmos_util.proto.TrackMetadata track_metadata = 4;
  .spotify.podcast_segments.SegmentType type = 5;
  string title = 6;
  string subtitle = 7;
  string image_url = 8;
  string action_url = 9;
  .spotify.cosmos_util.proto.EpisodeMetadata episode_metadata = 10;
  bool is_abridged = 11;
  optional string chapter_uri = 12;
}

