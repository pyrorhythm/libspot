syntax = "proto3";

package spotify.ads.esperanto.proto;

option java_package = "com.spotify.ads.esperanto.proto";
option java_multiple_files = true;
option objc_class_prefix = "ESP";

service Reward {
  rpc GetReward (.spotify.ads.esperanto.proto.GetRewardRequest) returns (.spotify.ads.esperanto.proto.RewardResponse) {}
  rpc SetReward (.spotify.ads.esperanto.proto.SetRewardRequest) returns (.spotify.ads.esperanto.proto.RewardResponse) {}
}

message GetRewardRequest {
}

message SetRewardRequest {
  uint32 reward_time = 3;
}

message RewardResponse {
  uint32 reward_seconds = 1;
  uint32 rewarded_seconds = 2;
}

