syntax = "proto2";

package spotify.cosmos_util.proto;

option java_package = "com.spotify.cosmos.util.proto";
option java_multiple_files = true;
option objc_class_prefix = "SPTCosmosUtil";

message EpisodeCollectionState {
  optional bool is_following_show = 1;
  optional bool is_new = 2;
  optional bool is_in_listen_later = 3;
}

