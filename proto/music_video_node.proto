syntax = "proto2";

package spotify.player.proto;

import "track_instance.proto";
import "transition_map.proto";

message MusicVideoNode {
  optional string video_gid = 1;
  optional string associated_audio = 2;
  optional string associated_video = 3;
  optional .spotify.player.proto.TrackInstance switched_to_track = 4;
  optional .spotify.player.proto.TrackInstance original_track = 5;
  optional .spotify.player.proto.TransitionMap original_transition_map = 6;
  optional bool unmapped_switched_to_audio = 7;
  optional bool did_query = 8;
  optional bool did_transitionmap_query = 9;
  optional bool audio_is_filtered = 10;
  optional bool video_is_filtered = 11;
}

