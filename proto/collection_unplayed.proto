syntax = "proto3";

package spotify.collection_esperanto.proto;

option java_package = "com.spotify.collection_esperanto.proto";
option java_multiple_files = true;
option objc_class_prefix = "ESP";

import "status.proto";

message CollectionUnplayedRequest {
  repeated string uri = 1;
}

message CollectionUnplayedResponse {
  .spotify.collection_cosmos.proto.Status status = 1;
}

