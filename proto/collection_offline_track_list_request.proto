syntax = "proto3";

package spotify.collection_cosmos.proto;

option java_package = "spotify.collection.esperanto.proto";
option java_multiple_files = true;
option objc_class_prefix = "ESP";

import "status.proto";

message CollectionOfflineTrackListRequest {
  string id = 1;
  string sort = 2;
  string filter = 3;
}

message CollectionOfflineTrackListResponse {
  .spotify.collection_cosmos.proto.Status status = 1;
}

message CollectionTrackListOfflineStatusResponse {
  .spotify.collection_cosmos.proto.Status status = 1;
  bool offline = 2;
}

