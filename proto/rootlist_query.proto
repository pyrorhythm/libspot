syntax = "proto3";

package spotify.playlist_esperanto.proto;

option java_package = "spotify.playlist.esperanto.proto";
option java_multiple_files = true;
option objc_class_prefix = "ESP";

message RootlistRange {
  int32 start = 1;
  int32 length = 2;
}

message SourceRestriction {
  int32 max_first_n_items = 1;
}

message RootlistQuery {
  enum BoolPredicate {
    ROOTLIST_ITEM_NO_FILTER = 0;
    ROOTLIST_ITEM_AVAILABLE_OFFLINE = 1;
    ROOTLIST_ITEM_IS_WRITABLE = 2;
  }

  enum SortBy {
    NO_SORT = 0;
    NAME_ASC = 1;
    NAME_DESC = 2;
    ADD_TIME_ASC = 3;
    ADD_TIME_DESC = 4;
    RECENTLY_PLAYED_RANK_ASC = 5;
    RECENTLY_PLAYED_RANK_DESC = 6;
    FRECENCY_SCORE_ASC = 7;
    FRECENCY_SCORE_DESC = 8;
    OFFLINE_STATE_ASC = 9;
    OFFLINE_STATE_DESC = 10;
  }

  string folder_uri = 1;
  repeated .spotify.playlist_esperanto.proto.RootlistQuery.BoolPredicate bool_predicates = 2;
  string text_filter = 3;
  .spotify.playlist_esperanto.proto.RootlistQuery.SortBy sort_by = 4;
  .spotify.playlist_esperanto.proto.RootlistRange range = 5;
  .spotify.playlist_esperanto.proto.SourceRestriction source_restriction = 6;
  .spotify.playlist_esperanto.proto.RootlistItemType item_type = 7;
  bool group = 8;
  bool delta_updates = 9;
  bool flatten_tree = 10;
  int32 update_throttling_ms = 11;
}

enum RootlistItemType {
  ALL_ROOTLIST_ITEMS = 0;
  PLAYLISTS_IN_ROOTLIST = 1;
  FOLDERS_IN_ROOTLIST = 2;
}

