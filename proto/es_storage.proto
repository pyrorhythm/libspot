syntax = "proto3";

package spotify.storage.esperanto.proto;

option java_package = "com.spotify.storage.esperanto.proto";
option objc_class_prefix = "ESP";

import "google/protobuf/empty.proto";

service Storage {
  rpc GetCacheSizeLimit (.spotify.storage.esperanto.proto.GetCacheSizeLimitParams) returns (.spotify.storage.esperanto.proto.CacheSizeLimit) {}
  rpc SetCacheSizeLimit (.spotify.storage.esperanto.proto.SetCacheSizeLimitParams) returns (.google.protobuf.Empty) {}
  rpc DeleteExpiredItems (.spotify.storage.esperanto.proto.DeleteExpiredItemsParams) returns (.google.protobuf.Empty) {}
  rpc DeleteUnlockedItems (.spotify.storage.esperanto.proto.DeleteUnlockedItemsParams) returns (.google.protobuf.Empty) {}
  rpc GetStats (.spotify.storage.esperanto.proto.GetStatsParams) returns (.spotify.storage.esperanto.proto.Stats) {}
  rpc GetFileRanges (.spotify.storage.esperanto.proto.GetFileRangesParams) returns (.spotify.storage.esperanto.proto.FileRanges) {}
}

message CacheSizeLimit {
  int64 size = 1;
}

message GetCacheSizeLimitParams {
}

message SetCacheSizeLimitParams {
  .spotify.storage.esperanto.proto.CacheSizeLimit limit = 1;
}

message DeleteExpiredItemsParams {
}

message DeleteUnlockedItemsParams {
}

message RealmStats {
  .spotify.storage.esperanto.proto.Realm realm = 1;
  int64 size = 2;
  int64 num_entries = 3;
  int64 num_complete_entries = 4;
}

message Stats {
  string cache_id = 1;
  int64 creation_date_sec = 2;
  int64 max_cache_size = 3;
  int64 current_size = 4;
  int64 current_locked_size = 5;
  int64 free_space = 6;
  int64 total_space = 7;
  int64 current_numfiles = 8;
  repeated .spotify.storage.esperanto.proto.RealmStats realm_stats = 9;
}

message GetStatsParams {
}

message FileRanges {
  message Range {
    uint64 from_byte = 1;
    uint64 to_byte = 2;
  }

  bool byte_size_known = 1;
  uint64 byte_size = 2;
  repeated .spotify.storage.esperanto.proto.FileRanges.Range ranges = 3;
}

message GetFileRangesParams {
  .spotify.storage.esperanto.proto.Realm realm = 1;
  string file_id = 2;
}

enum Realm {
  STREAM = 0;
  COVER_ART = 1;
  PLAYLIST = 4;
  AUDIO_SHOW = 5;
  HEAD_FILES = 7;
  EXTERNAL_AUDIO_SHOW = 8;
  KARAOKE_MASK = 9;
}

