syntax = "proto3";

package spotify.your_library.proto;

import "policy/supported_link_types_in_playlists.proto";

message YourLibraryEntityInfo {
  enum Pinnable {
    YES = 0;
    NO_IN_FOLDER = 1;
    NOT_VALID_TYPE = 2;
  }

  string name = 2;
  string uri = 3;
  string group_label = 5;
  string image_uri = 6;
  bool pinned = 7;
  .spotify.your_library.proto.YourLibraryEntityInfo.Pinnable pinnable = 8;
  .spotify.your_library.proto.Offline.Availability offline_availability = 9;
  int64 add_time = 11;
  int64 last_played = 12;
  bool has_curated_items = 13;
}

message Offline {
  enum Availability {
    UNKNOWN = 0;
    NO = 1;
    YES = 2;
    DOWNLOADING = 3;
    WAITING = 4;
  }

}

message YourLibraryAlbumExtraInfo {
  enum Type {
    ALBUM = 0;
    SINGLE = 1;
    COMPILATION = 2;
    EP = 3;
  }

  string artist_name = 1;
  string artist_uri = 2;
  .spotify.your_library.proto.YourLibraryAlbumExtraInfo.Type type = 3;
  bool is_premium_only = 4;
  bool new_release = 5;
  int64 release_date = 6;
}

message YourLibraryArtistExtraInfo {
  bool has_liked_tracks_or_albums = 1;
}

message NumberOfItemsForLinkType {
  .spotify.playlist.cosmos.proto.LinkType link_type = 1;
  int32 num_items = 2;
}

message YourLibraryPlaylistFolderInfo {
  string uri = 1;
  string name = 2;
}

message YourLibraryPlaylistExtraInfo {
  enum GenerationStatus {
    MESSAGE_STATUS_UNKNOWN = 0;
    MESSAGE_STATUS_SUCCESS = 1;
    MESSAGE_STATUS_QUEUED = 2;
    MESSAGE_STATUS_PROCESSING = 3;
    MESSAGE_STATUS_ERROR = 4;
  }

  string creator_name = 1;
  string creator_uri = 8;
  bool is_loading = 5;
  bool can_view = 6;
  bool can_add = 9;
  string row_id = 7;
  string made_for_name = 10;
  string made_for_uri = 11;
  repeated .spotify.your_library.proto.NumberOfItemsForLinkType number_of_items_per_link_type = 12;
  bool owned_by_self = 13;
  .spotify.your_library.proto.YourLibraryPlaylistFolderInfo from_folder = 14;
  string name_prefix = 15;
  bool mixing_active = 16;
  bool is_empty_predefined = 17;
  .spotify.your_library.proto.YourLibraryPlaylistExtraInfo.GenerationStatus prompt_generation_status = 18;
  bool prompt_is_personalized = 19;
  bool is_prompt_playlist = 20;
  bool is_published = 21;
  bool is_private = 22;
}

message YourLibraryShowExtraInfo {
  string creator_name = 1;
  int64 publish_date = 4;
  int32 number_of_downloaded_episodes = 6;
}

message YourLibraryFolderExtraInfo {
  int32 number_of_playlists = 2;
  int32 number_of_folders = 3;
  string row_id = 4;
  repeated .spotify.your_library.proto.YourLibraryDecoratedEntity entity = 5;
}

message YourLibraryLikedSongsExtraInfo {
  int32 number_of_songs = 3;
  bool is_empty = 4;
}

message YourLibraryNewEpisodesExtraInfo {
  int64 publish_date = 1;
}

message YourLibraryLocalFilesExtraInfo {
  int32 number_of_files = 1;
}

message YourLibraryBookExtraInfo {
  enum Access {
    OPEN = 0;
    LOCKED = 1;
    CAPPED = 2;
  }

  enum State {
    NOT_STARTED = 0;
    IN_PROGRESS = 1;
    FINISHED = 2;
  }

  string author_name = 1;
  .spotify.your_library.proto.YourLibraryBookExtraInfo.Access access = 2;
  int64 milliseconds_left = 3;
  int32 percent_done = 4;
  .spotify.your_library.proto.YourLibraryBookExtraInfo.State state = 5;
}

message YourLibraryCachedFilesExtraInfo {
  int32 number_of_items = 1;
  int32 duration_in_seconds = 2;
}

message YourLibraryPreReleaseExtraInfo {
  enum Type {
    ALBUM = 0;
    BOOK = 1;
  }

  string artist_name = 1;
  string artist_uri = 2;
  .spotify.your_library.proto.YourLibraryPreReleaseExtraInfo.Type type = 3;
  .spotify.your_library.proto.YourLibraryAlbumExtraInfo.Type album_type = 4;
}

message YourLibraryEventExtraInfo {
  string location_name = 1;
  int64 start_time = 2;
  string city_name = 3;
}

message YourLibraryAuthorExtraInfo {
}

message YourLibraryVenueExtraInfo {
  string address_name = 1;
  string city_name = 2;
}

message YourLibraryConcertCampaignExtraInfo {
  enum Status {
    UNSPECIFIED = 0;
    RESERVED = 1;
    FCFS = 2;
    WAITLISTED = 3;
    PURCHASED = 4;
    INELIGIBLE = 5;
    SOLD_OUT = 6;
    CANCELLED = 7;
    SALE_ENDED = 8;
  }

  .spotify.your_library.proto.YourLibraryConcertCampaignExtraInfo.Status status = 1;
  int64 start_time = 2;
  int64 end_time = 3;
}

message YourLibraryDecoratedEntity {
  .spotify.your_library.proto.YourLibraryEntityInfo entity_info = 1;
  oneof entity {
    .spotify.your_library.proto.YourLibraryAlbumExtraInfo album = 2;
    .spotify.your_library.proto.YourLibraryArtistExtraInfo artist = 3;
    .spotify.your_library.proto.YourLibraryPlaylistExtraInfo playlist = 4;
    .spotify.your_library.proto.YourLibraryShowExtraInfo show = 5;
    .spotify.your_library.proto.YourLibraryFolderExtraInfo folder = 6;
    .spotify.your_library.proto.YourLibraryLikedSongsExtraInfo liked_songs = 8;
    .spotify.your_library.proto.YourLibraryNewEpisodesExtraInfo new_episodes = 10;
    .spotify.your_library.proto.YourLibraryLocalFilesExtraInfo local_files = 11;
    .spotify.your_library.proto.YourLibraryBookExtraInfo book = 12;
    .spotify.your_library.proto.YourLibraryCachedFilesExtraInfo cached_files = 13;
    .spotify.your_library.proto.YourLibraryPreReleaseExtraInfo prerelease = 15;
    .spotify.your_library.proto.YourLibraryEventExtraInfo event = 16;
    .spotify.your_library.proto.YourLibraryAuthorExtraInfo author = 17;
    .spotify.your_library.proto.YourLibraryVenueExtraInfo venue = 19;
    .spotify.your_library.proto.YourLibraryConcertCampaignExtraInfo concert_campaign = 20;
  }
}

